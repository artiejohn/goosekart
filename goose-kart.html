<script>
'use strict';

// ── DATA ──────────────────────────────────────────────────────────────────────
const CHARS=[
  {id:'honker',name:'Sir Honks-a-Lot',emoji:'🪿',color:0xF5F0DC,accent:0xFFA500,
   ability:'MEGA HONK',desc:'Shockwave stuns nearby racers',spd:1.0,hdl:1.0,cd:8000},
  {id:'canada',name:'Goose Trudeau',  emoji:'🦆',color:0x2a2a2a,accent:0xFFFFFF,
   ability:'FEATHER BLAST',desc:'Shoot feathers forward',    spd:1.0,hdl:1.0,cd:5000},
  {id:'golden',name:'Golden Goose',   emoji:'⭐',color:0xFFCC00,accent:0xFF8800,
   ability:'EGG DROP',desc:'Drop eggs that stun drivers',      spd:1.0,hdl:1.0,cd:10000},
  {id:'racer', name:'Zoom McHonk',    emoji:'🏎️',color:0xFF3333,accent:0xFFFFFF,
   ability:'NONE',desc:'No ability — pure speed and skill',  spd:1.08,hdl:1.15,cd:99999},
];
const TRACKS=[
  {id:'snow',  name:'Frosty Peaks',emoji:'❄️',
   sky:0x8BBFD4,ground:0xEEF8FF,asphalt:0x445566,fog:0xAAD0E8,fogD:0.012,ambient:0x99BBCC,sun:0xCCDDFF},
  {id:'forest',name:'Fern Forest', emoji:'🌲',
   sky:0x0a1a0a,ground:0x0d5c0d,asphalt:0x1a1a1a,fog:0x0a1a0a,fogD:0.018,ambient:0x223322,sun:0x99BB77},
  {id:'grass', name:'Meadow Mile', emoji:'🌿',
   sky:0x5BB8FF,ground:0x2db832,asphalt:0x2a2a2a,fog:0x99DDFF,fogD:0.008,ambient:0x88BBFF,sun:0xFFFFCC},
];
const DIFFICULTIES=[
  {id:'easy',     label:'Easy',      emoji:'🐣', color:'#88FF88',
   spdMult:0.82, launchSpd:0.25, lookahead:18, cornerLoad:0.15, turnMult:1.0, accel:0.9, cdMult:1.0},
  {id:'normal',   label:'Normal',    emoji:'🪿', color:'#FFD700',
   spdMult:1.18, launchSpd:0.55, lookahead:26, cornerLoad:0.35, turnMult:1.4, accel:1.3, cdMult:1.0},
  {id:'hard',     label:'Hard',      emoji:'🔥', color:'#FF8800',
   spdMult:1.18, launchSpd:0.55, lookahead:33, cornerLoad:0.25, turnMult:1.7, accel:1.55, cdMult:0.7},
  {id:'impossible',label:'Impossible',emoji:'💀', color:'#FF2222',
   spdMult:1.28, launchSpd:0.63, lookahead:45, cornerLoad:0.11, turnMult:2.2, accel:1.95, cdMult:0.3},
];
const TRACK_CTRL={
  snow:[
    [80,0],[92,26],[96,54],[84,76],[58,92],[26,98],[0,93],[-26,98],[-58,92],[-84,74],
    [-96,44],[-96,8],[-88,-24],[-74,-54],[-54,-80],[-22,-95],[14,-92],[44,-80],[66,-55],[76,-28],
  ],
  forest:[
    [80,0],[92,26],[96,54],[84,76],[58,92],[26,98],[0,93],[-26,98],[-58,92],[-84,74],
    [-96,44],[-96,8],[-88,-24],[-74,-54],[-54,-80],[-22,-95],[14,-92],[44,-80],[66,-55],[76,-28],
  ],
  grass:[
    [80,0],[92,26],[96,54],[84,76],[58,92],[26,98],[0,93],[-26,98],[-58,92],[-84,74],
    [-96,44],[-96,8],[-88,-24],[-74,-54],[-54,-80],[-22,-95],[14,-92],[44,-80],[66,-55],[76,-28],
  ],
};

// ── MUSIC ─────────────────────────────────────────────────────────────────────
const MUSIC=(()=>{
  const elMap={
    menu:   'aud_menu',
    snow:   'aud_snow',
    forest: 'aud_forest',
    grass:  'aud_grass',
  };
  let currentEl=null;
  return {
    play(trackId){
      const elId=elMap[trackId];
      if(!elId){ console.warn('MUSIC: unknown track',trackId); return; }
      const el=document.getElementById(elId);
      if(!el){ console.warn('MUSIC: element not found',elId); return; }
      if(currentEl && currentEl!==el){ currentEl.pause(); currentEl.currentTime=0; }
      currentEl=el;
      el.volume=0.45;
      el.currentTime=0;
      el.play().catch(e=>console.warn('MUSIC play failed:',e));
    },
    stop(){
      if(!currentEl) return;
      currentEl.pause();
      currentEl.currentTime=0;
      currentEl=null;
    },
    setVolume(v){ if(currentEl) currentEl.volume=v; },
  };
})();

// ── GAME STATE ────────────────────────────────────────────────────────────────
let scene,camera,renderer,clock;
let trackPts=[],NCP=0;
let player=null,bots=[],projs=[],shockwaves=[],eggs=[],trackHazards=[];
let barrierSegs=[]; // [{ax,az,bx,bz}] — exact positions of every barrier panel edge
let finishLine=null; // {ox,oz,nx,nz} — origin and forward-normal of start/finish line
let keys={},racing=false,finished=false,cdActive=false;
let raceTime=0,raceStartTimer=0;
let selChar=null,selTrack=null,selDiff=null,mmCtx=null;
const NLAPS=3, ROAD_W=13;
const MAXSPD=0.65,ACC=0.022,BRK=0.038,FRIC=0.014,TURN=0.038;

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const SFX=(()=>{
  let ctx=null,engineGain=null,engineOsc=null,engineOsc2=null;
  function init(){
    if(ctx)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
  }
  function resume(){if(ctx&&ctx.state==='suspended')ctx.resume();}

  // Generic one-shot: freq sweep + volume envelope
  function tone(freq0,freq1,vol,dur,type='sine',detune=0){
    if(!ctx)return;
    const g=ctx.createGain();g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    const o=ctx.createOscillator();o.type=type;
    o.frequency.setValueAtTime(freq0,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq1,ctx.currentTime+dur*0.8);
    o.detune.value=detune;
    o.connect(g);g.connect(ctx.destination);
    o.start();o.stop(ctx.currentTime+dur);
  }

  // Noise burst (for impacts/hazards)
  function noise(vol,dur,lpFreq=800){
    if(!ctx)return;
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource();src.buffer=buf;
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=lpFreq;
    const g=ctx.createGain();g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    src.connect(lp);lp.connect(g);g.connect(ctx.destination);
    src.start();
  }

  return {
    init,resume,
    // Engine hum — continuous looping oscillators, pitch driven by speed
    startEngine(){
      if(!ctx||engineGain)return;
      engineGain=ctx.createGain();engineGain.gain.value=0.04;
      engineOsc=ctx.createOscillator();engineOsc.type='sawtooth';engineOsc.frequency.value=60;
      engineOsc2=ctx.createOscillator();engineOsc2.type='square';engineOsc2.frequency.value=62;
      const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;
      engineOsc.connect(lp);engineOsc2.connect(lp);lp.connect(engineGain);engineGain.connect(ctx.destination);
      engineOsc.start();engineOsc2.start();
    },
    updateEngine(spd){
      if(!engineOsc||!engineGain)return;
      const norm=Math.abs(spd)/MAXSPD;
      const freq=55+norm*180;
      engineOsc.frequency.setTargetAtTime(freq,ctx.currentTime,0.05);
      engineOsc2.frequency.setTargetAtTime(freq*1.03,ctx.currentTime,0.05);
      engineGain.gain.setTargetAtTime(0.02+norm*0.06,ctx.currentTime,0.05);
    },
    stopEngine(){
      if(!engineGain)return;
      engineGain.gain.setTargetAtTime(0,ctx.currentTime,0.1);
      setTimeout(()=>{
        try{engineOsc.stop();engineOsc2.stop();}catch(e){}
        engineOsc=engineOsc2=engineGain=null;
      },300);
    },
    // HONK — loud goose honk
    honk(){
      init();resume();
      tone(320,180,0.5,0.18,'sawtooth');
      tone(310,175,0.3,0.25,'square',10);
      setTimeout(()=>tone(280,150,0.35,0.2,'sawtooth'),120);
    },
    // Feather blast — whoosh
    featherBlast(){
      init();resume();
      noise(0.3,0.25,2000);
      tone(800,200,0.2,0.3,'sine');
    },
    // Egg drop — plop
    eggDrop(){
      init();resume();
      tone(200,80,0.4,0.2,'sine');
      setTimeout(()=>noise(0.15,0.1,300),80);
    },
    // Egg hit — splat
    eggSplat(){
      init();resume();
      noise(0.5,0.3,500);
      tone(150,60,0.3,0.25,'sine');
    },
    // Hazard hit — thud/crash
    hazardHit(trackId){
      init();resume();
      if(trackId==='snow'){
        // Ice spike — high glassy shatter
        noise(0.4,0.2,3000);
        tone(1200,200,0.3,0.3,'sine');
      } else if(trackId==='forest'){
        // Log — deep thud
        noise(0.6,0.4,200);
        tone(80,40,0.5,0.35,'sine');
      } else {
        // Hay bale — soft thump
        noise(0.35,0.25,400);
        tone(180,90,0.3,0.25,'sine');
      }
    },
    // Shockwave boom
    shockwave(){
      init();resume();
      noise(0.5,0.4,300);
      tone(120,40,0.6,0.5,'sine');
      tone(200,80,0.3,0.4,'sawtooth');
    },
    // Countdown beep
    countdownBeep(isFinal){
      init();resume();
      if(isFinal){
        tone(880,880,0.5,0.3,'sine');
        setTimeout(()=>tone(1320,1320,0.4,0.4,'sine'),200);
      } else {
        tone(440,440,0.3,0.2,'sine');
      }
    },
    // Lap complete
    lapComplete(){
      init();resume();
      [0,150,300].forEach((d,i)=>setTimeout(()=>tone(440+i*110,440+i*110,0.3,0.2,'sine'),d));
    },
    // Race finish — fanfare
    raceFinish(won){
      init();resume();
      if(won){
        const notes=[523,659,784,1047];
        notes.forEach((f,i)=>setTimeout(()=>tone(f,f,0.4,0.3,'sine'),i*150));
        setTimeout(()=>tone(1047,1047,0.5,0.6,'sine'),600);
      } else {
        tone(440,350,0.3,0.4,'sine');
        setTimeout(()=>tone(350,280,0.3,0.5,'sine'),300);
      }
    },
    // Menu button click
    menuClick(){
      init();resume();
      tone(600,800,0.2,0.08,'sine');
    },
    // Card select
    cardSelect(){
      init();resume();
      tone(500,700,0.15,0.06,'sine');
    },
    // Stun received
    stunned(){
      init();resume();
      tone(300,150,0.3,0.3,'sawtooth');
      noise(0.2,0.2,600);
    },
  };
})();

// ── TRACK ─────────────────────────────────────────────────────────────────────
function makeTrackPts(){
  const CTRL=TRACK_CTRL[selTrack.id]||TRACK_CTRL.snow;
  const N=CTRL.length,STEPS=10,pts=[];
  for(let i=0;i<N;i++){
    const p0=CTRL[(i-1+N)%N],p1=CTRL[i],p2=CTRL[(i+1)%N],p3=CTRL[(i+2)%N];
    for(let s=0;s<STEPS;s++){
      const t=s/STEPS,t2=t*t,t3=t2*t;
      pts.push(new THREE.Vector3(
        0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        0,
        0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
      ));
    }
  }
  return pts;
}

// ── ROAD ──────────────────────────────────────────────────────────────────────
function buildRoad(tk){
  const pts=trackPts,N=pts.length,W=ROAD_W;
  function rn(i){
    const a=pts[i%N],b=pts[(i+1)%N],dx=b.x-a.x,dz=b.z-a.z,l=Math.sqrt(dx*dx+dz*dz)||1;
    return {x:-dz/l,z:dx/l};
  }
  function makeRibbon(fn,y,col,basic){
    const v=[],idx=[];
    for(let i=0;i<=N;i++){
      const p=pts[i%N],r=rn(i),q=fn(p,r);
      v.push(q[0],y,q[1],q[2],y,q[3]);
      if(i<N){const b=i*2;idx.push(b,b+2,b+1,b+1,b+2,b+3);}
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
    g.setIndex(idx);g.computeVertexNormals();
    scene.add(new THREE.Mesh(g,basic?new THREE.MeshBasicMaterial({color:col}):new THREE.MeshLambertMaterial({color:col})));
  }

  // Gravel runoff
  makeRibbon((p,r)=>[p.x-r.x*(W+1.8),p.z-r.z*(W+1.8),p.x-r.x*(W+8),p.z-r.z*(W+8)],0.01,tk.id==='snow'?0xBBCCBB:0x887755,false);
  makeRibbon((p,r)=>[p.x+r.x*(W+1.8),p.z+r.z*(W+1.8),p.x+r.x*(W+8),p.z+r.z*(W+8)],0.01,tk.id==='snow'?0xBBCCBB:0x887755,false);

  // Asphalt — MeshBasicMaterial so lighting can't wash out the dark colour
  const darkAsphalt = tk.id==='snow' ? 0x1e2a3a : tk.id==='forest' ? 0x0e0e0e : 0x111111;
  makeRibbon((p,r)=>[p.x-r.x*W,p.z-r.z*W,p.x+r.x*W,p.z+r.z*W],0.03,darkAsphalt,true);

  // Alternating red/white kerb stripes — one quad per segment per side
  const matRed=new THREE.MeshBasicMaterial({color:0xFF1111,side:THREE.DoubleSide});
  const matWht=new THREE.MeshBasicMaterial({color:0xFFFFFF,side:THREE.DoubleSide});
  for(let i=0;i<N;i++){
    const p=pts[i%N],pn=pts[(i+1)%N],r=rn(i),r2=rn(i+1);
    const mat=i%2===0?matRed:matWht;
    for(const side of[-1,1]){
      const sv=[
        p.x +r.x*W*side,      0.07, p.z +r.z*W*side,
        p.x +r.x*(W+3)*side,  0.07, p.z +r.z*(W+3)*side,
        pn.x+r2.x*W*side,     0.07, pn.z+r2.z*W*side,
        pn.x+r2.x*(W+3)*side, 0.07, pn.z+r2.z*(W+3)*side,
      ];
      const sg=new THREE.BufferGeometry();
      sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
      // DoubleSide material means winding doesn't matter, but set correctly anyway
      sg.setIndex(side===-1?[0,2,1,1,2,3]:[0,1,2,1,3,2]);
      sg.computeVertexNormals();
      scene.add(new THREE.Mesh(sg,mat));
    }
  }

  // Thick white edge lines
  makeRibbon((p,r)=>[p.x-r.x*(W-1.0),p.z-r.z*(W-1.0),p.x-r.x*(W-0.05),p.z-r.z*(W-0.05)],0.08,0xFFFFFF,true);
  makeRibbon((p,r)=>[p.x+r.x*(W-0.05),p.z+r.z*(W-0.05),p.x+r.x*(W-1.0),p.z+r.z*(W-1.0)],0.08,0xFFFFFF,true);

  // Centre dashes (wider and more frequent)
  const dv=[],di=[];
  for(let i=0,c=0;i<N;i+=4,c++){
    const p=pts[i],r=rn(i),pn=pts[(i+2)%N],r2=rn(i+2),b=c*4;
    dv.push(p.x-r.x*0.4,0.08,p.z-r.z*0.4, p.x+r.x*0.4,0.08,p.z+r.z*0.4,
            pn.x-r2.x*0.4,0.08,pn.z-r2.z*0.4, pn.x+r2.x*0.4,0.08,pn.z+r2.z*0.4);
    di.push(b,b+2,b+1,b+1,b+2,b+3);
  }
  const dg=new THREE.BufferGeometry();
  dg.setAttribute('position',new THREE.Float32BufferAttribute(dv,3));
  dg.setIndex(di);dg.computeVertexNormals();
  scene.add(new THREE.Mesh(dg,new THREE.MeshBasicMaterial({color:0xFFFFBB})));

  // Start/finish line — bold chequered pattern centred on track
  const s0=pts[0];
  const rt=rn(0); // use exact same normal as road ribbon
  // forward = rotate normal 90°
  const fw={x:rt.z,z:-rt.x};
  const ang=Math.atan2(fw.x,fw.z);
  const sqW=(W*2)/8;
  for(let ci=0;ci<8;ci++){
    const off=(ci-3.5)*sqW+sqW/2;  // offset from track centre along right-normal
    const cx=s0.x+rt.x*(off-2), cz=s0.z+rt.z*(off-2);
    const sq=new THREE.Mesh(new THREE.BoxGeometry(sqW*0.98,0.12,3.5),
      new THREE.MeshBasicMaterial({color:ci%2===0?0xFFFFFF:0x111111}));
    sq.position.set(cx,0.1,cz);sq.rotation.y=ang;scene.add(sq);
  }

  // Gantry
  const gW=W*2+8;
  const poleMat=new THREE.MeshLambertMaterial({color:0xCCCCCC});
  const redMat=new THREE.MeshLambertMaterial({color:0xDD1111});
  for(const s of[-1,1]){
    // Striped pole
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,12,8),poleMat);
    pole.position.set(s0.x+rt.x*(gW/2)*s,6,s0.z+rt.z*(gW/2)*s);scene.add(pole);
    for(let h=1;h<12;h+=2.5){
      const ring=new THREE.Mesh(new THREE.CylinderGeometry(0.52,0.52,0.7,8),redMat);
      ring.position.set(s0.x+rt.x*(gW/2)*s,h,s0.z+rt.z*(gW/2)*s);scene.add(ring);
    }
    // Red warning light
    const l=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6),new THREE.MeshBasicMaterial({color:0xFF2200}));
    l.position.set(s0.x+rt.x*(gW/2-1)*s,12.8,s0.z+rt.z*(gW/2-1)*s);scene.add(l);
  }
  const bar=new THREE.Mesh(new THREE.BoxGeometry(gW,1.2,1.2),poleMat);
  bar.position.set(s0.x,12,s0.z);bar.rotation.y=ang;scene.add(bar);
  // Chequered sign board
  const signBase=new THREE.Mesh(new THREE.BoxGeometry(gW*0.65,2.5,0.25),new THREE.MeshBasicMaterial({color:0x111111}));
  signBase.position.set(s0.x,10.2,s0.z);signBase.rotation.y=ang;scene.add(signBase);
  const flagSqW=(gW*0.65)/8;
  for(let c=0;c<8;c++) for(let row=0;row<2;row++){
    const fs=new THREE.Mesh(new THREE.BoxGeometry(flagSqW*0.96,1.1,0.28),
      new THREE.MeshBasicMaterial({color:(c+row)%2===0?0xFFFFFF:0x222222}));
    fs.position.set(s0.x+rt.x*((c-3.5)*flagSqW+flagSqW/2),(row===0?9.7:10.8),s0.z+rt.z*((c-3.5)*flagSqW+flagSqW/2));
    fs.rotation.y=ang;scene.add(fs);
  }

  // Store finish line as two endpoints for segment-intersection lap detection
  // Matches exactly the chequered squares: centred on s0, spanning the full road width along rt
  {
    const rt0=rn(0);
    finishLine={
      ax: s0.x - rt0.x*W, az: s0.z - rt0.z*W,
      bx: s0.x + rt0.x*W, bz: s0.z + rt0.z*W,
      fx: rt0.z, fz: -rt0.x  // forward direction (crossing normal)
    };
  }

  // ── ARMCO BARRIERS + FENCE ───────────────────────────────────────────────
  // Placed at W+3 (outer kerb edge) outward — exactly where the kerb stripe ends.
  const BOFF = W + 3.15; // just outside the outer kerb edge
  const armcoSilver = new THREE.MeshLambertMaterial({color:0xBBBBBB});
  const armcoRed2   = new THREE.MeshLambertMaterial({color:0xCC1111});
  const postMat     = new THREE.MeshLambertMaterial({color:0x444444});
  const wireMat     = new THREE.MeshBasicMaterial({color:0x777777});

  barrierSegs = []; // reset each time track is built

  for(let i=0;i<N;i++){
    const p  = pts[i%N],      pn = pts[(i+1)%N];
    const r  = rn(i),         r2 = rn(i+1);

    // Forward direction of this segment (for panel rotation)
    const fdx = pn.x-p.x,    fdz = pn.z-p.z;
    const flen = Math.sqrt(fdx*fdx+fdz*fdz)||1;
    const segLen = flen;
    // Rotation so BoxGeometry's Z-axis aligns with segment direction
    const segAngle = Math.atan2(fdx, fdz);

    for(const s of[-1,1]){
      // Panel endpoints — same formula as kerb stripes
      const ax = p.x  + r.x  * BOFF * s,  az = p.z  + r.z  * BOFF * s;
      const bx = pn.x + r2.x * BOFF * s,  bz = pn.z + r2.z * BOFF * s;

      // Store the inner face of the barrier as a collision segment
      barrierSegs.push({ax, az, bx, bz});
      // Centre of panel
      const mx = (ax+bx)*0.5,  mz = (az+bz)*0.5;
      // Actual length between the two endpoints
      const plen = Math.sqrt((bx-ax)**2+(bz-az)**2)||1;
      // Angle between the two endpoints
      const pAngle = Math.atan2(bx-ax, bz-az);

      // Armco panel colour — red accent every 4 segments
      const mat = Math.floor(i/4)%6===0 ? armcoRed2 : armcoSilver;
      // BoxGeometry: length along Z (plen), decent thickness along X (0.5) facing track, height 0.7
      const panel = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, plen*1.02), mat);
      panel.position.set(mx, 0.55, mz);
      panel.rotation.y = pAngle;
      scene.add(panel);

      // Corrugation ridge — slightly wider, centred on panel face
      const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.22, plen*1.02), armcoSilver);
      ridge.position.set(mx, 0.55, mz);
      ridge.rotation.y = pAngle;
      scene.add(ridge);

      // Post every 4 segments
      if(i%4===0){
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.4, 0.18), postMat);
        post.position.set(ax, 1.2, az);
        scene.add(post);

        // 3 wire strands above barrier
        const nx = pn.x + r2.x*BOFF*s,  nz = pn.z + r2.z*BOFF*s;
        for(const wy of [1.25, 1.65, 2.05]){
          const wg = new THREE.BufferGeometry();
          wg.setAttribute('position', new THREE.Float32BufferAttribute([ax,wy,az, nx,wy,nz], 3));
          scene.add(new THREE.LineSegments(wg, wireMat));
        }
      }
    }
  }
}



// ── DECOS ─────────────────────────────────────────────────────────────────────
function buildDecos(tk){
  const SAFE = 28; // minimum distance from any track point

  function place(count, minDist, fn){
    for(let i=0;i<count;i++){
      let x,z,tries=0;
      do{ x=(Math.random()-0.5)*440; z=(Math.random()-0.5)*400; tries++; }
      while(tries<40 && trackPts.some(p=>Math.hypot(x-p.x,z-p.z)<minDist));
      if(tries<40) fn(x,z);
    }
  }

  // ── SNOW MAP ────────────────────────────────────────────────────────────────
  if(tk.id==='snow'){
    const mSnowW  = new THREE.MeshLambertMaterial({color:0xFFFFFF});
    const mSnowB  = new THREE.MeshLambertMaterial({color:0xDDEEFF});
    const mTrunk  = new THREE.MeshLambertMaterial({color:0x775533});
    const mPine1  = new THREE.MeshLambertMaterial({color:0xBBDDFF});
    const mPine2  = new THREE.MeshLambertMaterial({color:0xDDEEFF});
    const mRock   = new THREE.MeshLambertMaterial({color:0x889999});
    const mCarrot = new THREE.MeshBasicMaterial({color:0xFF6600});
    const mCoal   = new THREE.MeshBasicMaterial({color:0x111111});
    const mScarf  = new THREE.MeshLambertMaterial({color:0xCC2200});

    // Snow pines — bigger and more of them
    place(9,  SAFE, (x,z)=>{
      const sz = Math.floor(Math.random()*3);
      const radii=[2.2,3.4,5.0], heights=[5,9,14], tH=[1.4,2.0,2.8];
      const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.55,tH[sz],6), mTrunk);
      tr.position.set(x, tH[sz]*0.5, z); scene.add(tr);
      const c1 = new THREE.Mesh(new THREE.ConeGeometry(radii[sz],heights[sz]*0.7,7), mPine1);
      c1.position.set(x, tH[sz]+heights[sz]*0.35, z); scene.add(c1);
      const c2 = new THREE.Mesh(new THREE.ConeGeometry(radii[sz]*0.6,heights[sz]*0.5,7), mPine2);
      c2.position.set(x, tH[sz]+heights[sz]*0.62, z); scene.add(c2);
      const cap = new THREE.Mesh(new THREE.ConeGeometry(radii[sz]*0.45,2.0,6), mSnowW);
      cap.position.set(x, tH[sz]+heights[sz]*1.02, z); scene.add(cap);
    });

    // Snowmen — bigger scale range
    place(3,  SAFE, (x,z)=>{
      const scale = 1.2 + Math.random()*1.0;
      const b1 = new THREE.Mesh(new THREE.SphereGeometry(0.9*scale,10,8), mSnowW);
      b1.position.set(x, 0.9*scale, z); scene.add(b1);
      const b2 = new THREE.Mesh(new THREE.SphereGeometry(0.65*scale,10,8), mSnowW);
      b2.position.set(x, 2.15*scale, z); scene.add(b2);
      const b3 = new THREE.Mesh(new THREE.SphereGeometry(0.45*scale,10,8), mSnowW);
      b3.position.set(x, 3.1*scale, z); scene.add(b3);
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.07*scale,0.45*scale,6), mCarrot);
      nose.rotation.x = Math.PI/2; nose.position.set(x, 3.1*scale, z+0.45*scale); scene.add(nose);
      for(const ex of[-0.15,0.15]){
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06*scale,5,4), mCoal);
        eye.position.set(x+ex*scale, 3.22*scale, z+0.38*scale); scene.add(eye);
      }
      for(let b=0;b<3;b++){
        const btn = new THREE.Mesh(new THREE.SphereGeometry(0.07*scale,5,4), mCoal);
        btn.position.set(x, (2.5-b*0.25)*scale, z+0.6*scale); scene.add(btn);
      }
      const scarf = new THREE.Mesh(new THREE.TorusGeometry(0.46*scale,0.1*scale,6,12), mScarf);
      scarf.rotation.x = Math.PI/2; scarf.position.set(x, 2.75*scale, z); scene.add(scarf);
      const hatBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.55*scale,0.55*scale,0.1*scale,10), mCoal);
      hatBrim.position.set(x, 3.52*scale, z); scene.add(hatBrim);
      const hatTop = new THREE.Mesh(new THREE.CylinderGeometry(0.35*scale,0.35*scale,0.55*scale,10), mCoal);
      hatTop.position.set(x, 3.82*scale, z); scene.add(hatTop);
    });

    // Snow piles / drifts — bigger
    place(4,  SAFE, (x,z)=>{
      const w=3+Math.random()*3, h=0.8+Math.random()*1.2;
      const pile = new THREE.Mesh(new THREE.SphereGeometry(1,8,5), mSnowW);
      pile.scale.set(w,h,w*0.7+Math.random()*0.5);
      pile.position.set(x, h*0.5, z); scene.add(pile);
      const pile2 = new THREE.Mesh(new THREE.SphereGeometry(0.7,7,4), mSnowB);
      pile2.scale.set(1.8,0.8,1.3);
      pile2.position.set(x+(Math.random()-0.5)*3, 0.4, z+(Math.random()-0.5)*2); scene.add(pile2);
    });

    // Snow-covered rocks — bigger
    place(3,  SAFE, (x,z)=>{
      const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.8,0), mRock);
      rock.scale.setScalar(1.0+Math.random()*1.2);
      rock.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
      rock.position.set(x,0.5,z); scene.add(rock);
      const snowcap = new THREE.Mesh(new THREE.SphereGeometry(0.7,7,4), mSnowW);
      snowcap.scale.set(1.3,0.5,1.2); snowcap.position.set(x,1.1,z); scene.add(snowcap);
    });

    // Ice crystals
    place(3,  SAFE, (x,z)=>{
      const mIce = new THREE.MeshLambertMaterial({color:0xAADDFF, transparent:true, opacity:0.75});
      for(let c=0;c<4;c++){
        const h=1.5+Math.random()*2.5;
        const crystal = new THREE.Mesh(new THREE.ConeGeometry(0.2+Math.random()*0.2, h, 5), mIce);
        crystal.position.set(x+(Math.random()-0.5)*2.5, h*0.5, z+(Math.random()-0.5)*2.5);
        crystal.rotation.y = Math.random()*Math.PI*2;
        scene.add(crystal);
      }
    });

    // Frozen pond patches
    place(3,  SAFE, (x,z)=>{
      const mIcePond = new THREE.MeshBasicMaterial({color:0xCCEEFF, transparent:true, opacity:0.7});
      const pond = new THREE.Mesh(new THREE.CylinderGeometry(4+Math.random()*3, 4+Math.random()*3, 0.08, 12), mIcePond);
      pond.position.set(x, 0.05, z); scene.add(pond);
      // crack lines
      const mCrack = new THREE.MeshBasicMaterial({color:0x88AACC});
      for(let cr=0;cr<3;cr++){
        const crackMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.09, 3+Math.random()*3), mCrack);
        crackMesh.position.set(x+(Math.random()-0.5)*3, 0.1, z+(Math.random()-0.5)*3);
        crackMesh.rotation.y = Math.random()*Math.PI; scene.add(crackMesh);
      }
    });

  // ── FOREST MAP ──────────────────────────────────────────────────────────────
  } else if(tk.id==='forest'){
    const mTrunk   = new THREE.MeshLambertMaterial({color:0x2d1205});
    const mTrunkL  = new THREE.MeshLambertMaterial({color:0x3d1f08});
    const mDark1   = new THREE.MeshLambertMaterial({color:0x071a07});
    const mDark2   = new THREE.MeshLambertMaterial({color:0x0d2e0d});
    const mMid     = new THREE.MeshLambertMaterial({color:0x1a5c0a});
    const mStemM   = new THREE.MeshLambertMaterial({color:0xDDBB88});
    const mMushrR  = new THREE.MeshLambertMaterial({color:0xCC2200});
    const mMushrY  = new THREE.MeshLambertMaterial({color:0xDDAA00});
    const mOrb     = new THREE.MeshBasicMaterial({color:0xAAFF44});
    const mLog     = new THREE.MeshLambertMaterial({color:0x5a3010});
    const mMoss    = new THREE.MeshLambertMaterial({color:0x2a6622});
    const mFern    = new THREE.MeshLambertMaterial({color:0x1a4a10});

    // Trees
    place(12,  SAFE, (x,z)=>{
      const h = 9 + Math.random()*18;
      const girth = 0.4+Math.random()*0.6;
      const tr = new THREE.Mesh(new THREE.CylinderGeometry(girth*0.7,girth,h*0.18+0.8,6), mTrunk);
      tr.position.set(x, (h*0.18+0.8)*0.5, z); scene.add(tr);
      const tiers = [[0.38,0.55,mDark1],[0.62,0.28,mMid]];
      tiers.forEach(([pct,size,mat])=>{
        const r = (2.5+Math.random()*2.0)*(size+0.2);
        const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h*(size+0.1)*1.2, 6), mat);
        cone.position.set(x, h*pct, z); scene.add(cone);
      });
    });

    // Shrubs
    place(5,  SAFE, (x,z)=>{
      const mShrub = Math.random()<0.5 ? mDark2 : mMid;
      const sc = 0.9+Math.random()*0.8;
      const shrub = new THREE.Mesh(new THREE.SphereGeometry(sc,6,4), mShrub);
      shrub.scale.y = 0.65;
      shrub.position.set(x, sc*0.65, z);
      scene.add(shrub);
    });

    // Mossy fallen logs
    place(3,  SAFE, (x,z)=>{
      const len = 4+Math.random()*7;
      const log = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.55,len,7), mLog);
      log.rotation.z = Math.PI/2; log.rotation.y = Math.random()*Math.PI;
      log.position.set(x,0.4,z); scene.add(log);
    });

    // Mushrooms
    place(3,  SAFE, (x,z)=>{
      const sc = 0.8+Math.random()*1.8;
      const isRed = Math.random()<0.6;
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.18*sc,0.25*sc,1.1*sc,6), mStemM);
      stem.position.set(x,0.55*sc,z); scene.add(stem);
      const cap = new THREE.Mesh(new THREE.SphereGeometry(0.9*sc,8,5), isRed?mMushrR:mMushrY);
      cap.scale.y=0.45; cap.position.set(x,1.25*sc,z); scene.add(cap);
    });

    // Firefly orbs
    place(5,  SAFE, (x,z)=>{
      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.25+Math.random()*0.18,5,4), mOrb);
      orb.position.set(x, 1.5+Math.random()*3, z);
      scene.add(orb);
    });

    // ── FOREST ANIMALS ──────────────────────────────────────────────────────
    const mDeer    = new THREE.MeshLambertMaterial({color:0xCC8844});
    const mDeerL   = new THREE.MeshLambertMaterial({color:0xEEAA66});
    const mDeerN   = new THREE.MeshLambertMaterial({color:0xFFDDBB});
    const mFox     = new THREE.MeshLambertMaterial({color:0xDD6622});
    const mFoxW    = new THREE.MeshLambertMaterial({color:0xFFEEDD});
    const mFoxBlk  = new THREE.MeshLambertMaterial({color:0x221100});
    const mRabbit  = new THREE.MeshLambertMaterial({color:0xBBAA99});
    const mOwl     = new THREE.MeshLambertMaterial({color:0x8B6914});
    const mOwlL    = new THREE.MeshLambertMaterial({color:0xCCAA55});
    const mOwlEye  = new THREE.MeshBasicMaterial({color:0xFFCC00});
    const mOwlPupil= new THREE.MeshBasicMaterial({color:0x111100});
    const mAnimalEye=new THREE.MeshBasicMaterial({color:0x111111});

    // Helper: angle from (x,z) toward nearest track point
    function faceTrack(x,z){
      let best=Infinity, bx=0, bz=0;
      for(const p of trackPts){
        const d=Math.hypot(x-p.x,z-p.z);
        if(d<best){best=d;bx=p.x;bz=p.z;}
      }
      return Math.atan2(bx-x, bz-z); // rot so +Z (forward) points toward track
    }

    // Deer — 14 of them, detailed with antlers
    place(5,  SAFE-8, (x,z)=>{
      const rot=faceTrack(x,z);

    place(3,  SAFE-8, (x,z)=>{

      for(const [ox,oz2,oy] of[[0.3,0.1,0],[-0.4,-0.2,0.1]]){
        const patch=new THREE.Mesh(new THREE.BoxGeometry(0.9*sc,0.85*sc,1.32*sc), mCow2);
        patch.position.set(x+pr*ox*sc, 1.4*sc+oy*sc, z+pz2*ox*sc);
        patch.rotation.y=rot; scene.add(patch);
      }
      // neck
      const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.3*sc,0.38*sc,0.9*sc,7), mCow1);
      neck.rotation.z=Math.PI*0.18; neck.rotation.y=rot;
      neck.position.set(x+cr*1.1*sc, 1.9*sc, z+sr*1.1*sc); scene.add(neck);
      // head
      const head=new THREE.Mesh(new THREE.BoxGeometry(0.95*sc,0.9*sc,0.9*sc), mCow1);
      head.position.set(x+cr*1.7*sc, 1.85*sc, z+sr*1.7*sc); scene.add(head);
      // snout
      const mSnout=new THREE.MeshLambertMaterial({color:0xFFCCCC});
      const snout=new THREE.Mesh(new THREE.BoxGeometry(0.6*sc,0.48*sc,0.42*sc), mSnout);
      snout.position.set(x+cr*2.2*sc, 1.68*sc, z+sr*2.2*sc); scene.add(snout);
      // nostrils
      const mNose=new THREE.MeshBasicMaterial({color:0xBB7777});
      for(const side of[-1,1]){
        const nostril=new THREE.Mesh(new THREE.SphereGeometry(0.07*sc,5,4), mNose);
        nostril.position.set(x+cr*2.42*sc+pr*side*0.13*sc, 1.72*sc, z+sr*2.42*sc+pz2*side*0.13*sc);
        scene.add(nostril);
      }
      // eyes
      const mEye=new THREE.MeshBasicMaterial({color:0x111111});
      for(const side of[-1,1]){
        const eye=new THREE.Mesh(new THREE.SphereGeometry(0.1*sc,6,5), mEye);
        eye.position.set(x+cr*1.82*sc+pr*side*0.38*sc, 2.1*sc, z+sr*1.82*sc+pz2*side*0.38*sc);
        scene.add(eye);
      }
      // horns
      const mHorn=new THREE.MeshLambertMaterial({color:0xFFEEAA});
      for(const side of[-1,1]){
        const horn=new THREE.Mesh(new THREE.ConeGeometry(0.09*sc,0.8*sc,5), mHorn);
        horn.rotation.z=side*0.4; horn.rotation.y=rot;
        horn.position.set(x+cr*1.7*sc+pr*side*0.35*sc, 2.55*sc, z+sr*1.7*sc+pz2*side*0.35*sc);
        scene.add(horn);
      }
      // tail
      const tail=new THREE.Mesh(new THREE.CylinderGeometry(0.07*sc,0.04*sc,0.9*sc,5), mCow1);
      tail.rotation.x=0.7; tail.rotation.y=rot;
      tail.position.set(x-cr*1.3*sc, 1.7*sc, z-sr*1.3*sc); scene.add(tail);
      const tailTuft=new THREE.Mesh(new THREE.SphereGeometry(0.18*sc,6,5), mCow2);
      tailTuft.position.set(x-cr*1.3*sc, 1.0*sc, z-sr*1.3*sc); scene.add(tailTuft);
      // udder
      const mUdder=new THREE.MeshLambertMaterial({color:0xFFBBBB});
      const udder=new THREE.Mesh(new THREE.SphereGeometry(0.3*sc,7,5), mUdder);
      udder.scale.set(1.2,0.6,0.8); udder.position.set(x, 0.7*sc, z); scene.add(udder);
      // legs — properly rotated with body
      for(const [lf,ls] of[[1,-1],[1,1],[-1,-1],[-1,1]]){
        const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.23*sc,0.19*sc,1.4*sc,6), mCow1);
        const lx=cr*lf*0.75*sc - pr*ls*0.42*sc;
        const lz2=sr*lf*0.75*sc - pz2*ls*0.42*sc;
        leg.position.set(x+lx, 0.7*sc, z+lz2); scene.add(leg);
        // hoof
        const hoof=new THREE.Mesh(new THREE.CylinderGeometry(0.21*sc,0.23*sc,0.22*sc,6), mCow2);
        hoof.position.set(x+lx, 0.05*sc, z+lz2); scene.add(hoof);
      }
    });

    // Sheep — bigger, fluffy, properly assembled
    place(4,  SAFE, (x,z)=>{
      const rot=Math.random()*Math.PI*2;
      const sc=1.6+Math.random()*0.5;
      const cr=Math.cos(rot), sr=Math.sin(rot);
      const pr=-sr, pz2=cr;
      // main body wool
      const body=new THREE.Mesh(new THREE.SphereGeometry(0.9*sc,10,8), mSheep);
      body.scale.set(1.4,1.05,1.1); body.position.set(x,1.15*sc,z); scene.add(body);
      // fluffy wool bumps all over body
      for(let f=0;f<8;f++){
        const a=f*Math.PI/4;
        const bump=new THREE.Mesh(new THREE.SphereGeometry(0.45*sc,7,5), mSheep);
        bump.position.set(
          x+Math.cos(a)*0.7*sc, 1.35*sc+Math.abs(Math.sin(a))*0.2*sc,
          z+Math.sin(a)*0.7*sc
        ); scene.add(bump);
      }
      // neck
      const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.22*sc,0.28*sc,0.55*sc,6), mSheepF);
      neck.rotation.z=0.25; neck.rotation.y=rot;
      neck.position.set(x+cr*0.95*sc, 1.55*sc, z+sr*0.95*sc); scene.add(neck);
      // head
      const head=new THREE.Mesh(new THREE.SphereGeometry(0.42*sc,9,7), mSheepF);
      head.scale.set(0.9,1.0,1.1);
      head.position.set(x+cr*1.35*sc, 1.6*sc, z+sr*1.35*sc); scene.add(head);
      // snout
      const mSheepSnout=new THREE.MeshLambertMaterial({color:0xBBAA99});
      const snout=new THREE.Mesh(new THREE.SphereGeometry(0.22*sc,7,5), mSheepSnout);
      snout.scale.set(0.9,0.7,0.8);
      snout.position.set(x+cr*1.75*sc, 1.48*sc, z+sr*1.75*sc); scene.add(snout);
      // eyes
      const mEyeS=new THREE.MeshBasicMaterial({color:0x222211});
      for(const side of[-1,1]){
        const eye=new THREE.Mesh(new THREE.SphereGeometry(0.08*sc,6,5), mEyeS);
        eye.position.set(x+cr*1.45*sc+pr*side*0.25*sc, 1.75*sc, z+sr*1.45*sc+pz2*side*0.25*sc);
        scene.add(eye);
      }
      // ears
      for(const side of[-1,1]){
        const ear=new THREE.Mesh(new THREE.SphereGeometry(0.18*sc,6,5), mSheepF);
        ear.scale.set(0.5,1.0,0.8);
        ear.position.set(x+cr*1.35*sc+pr*side*0.48*sc, 1.85*sc, z+sr*1.35*sc+pz2*side*0.48*sc);
        scene.add(ear);
      }
      // wool on head top
      const headWool=new THREE.Mesh(new THREE.SphereGeometry(0.32*sc,7,6), mSheep);
      headWool.position.set(x+cr*1.35*sc, 2.0*sc, z+sr*1.35*sc); scene.add(headWool);
      // tail stump
      const tail=new THREE.Mesh(new THREE.SphereGeometry(0.22*sc,6,5), mSheep);
      tail.position.set(x-cr*1.15*sc, 1.4*sc, z-sr*1.15*sc); scene.add(tail);
      // legs — correctly placed relative to body orientation
      for(const [lf,ls] of[[1,-1],[1,1],[-1,-1],[-1,1]]){
        const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.13*sc,0.11*sc,1.0*sc,5), mSheepF);
        const lx=cr*lf*0.55*sc - pr*ls*0.38*sc;
        const lz2=sr*lf*0.55*sc - pz2*ls*0.38*sc;
        leg.position.set(x+lx, 0.5*sc, z+lz2); scene.add(leg);
        // tiny hooves
        const hoof=new THREE.Mesh(new THREE.CylinderGeometry(0.12*sc,0.13*sc,0.18*sc,5), mSheepF);
        hoof.position.set(x+lx, 0.04*sc, z+lz2); scene.add(hoof);
      }
    });

    // Chickens — bigger, more detailed, properly assembled
    place(4,  SAFE, (x,z)=>{
      const rot=Math.random()*Math.PI*2;
      const sc=1.8+Math.random()*0.6;
      const cr=Math.cos(rot), sr=Math.sin(rot);
      const pr=-sr, pz2=cr;
      const mWattle=new THREE.MeshLambertMaterial({color:0xFF3333});
      // body
      const body=new THREE.Mesh(new THREE.SphereGeometry(0.42*sc,9,7), mChicken);
      body.scale.set(1.05,0.9,1.25); body.position.set(x, 0.62*sc, z); scene.add(body);
      // tail feathers
      for(let t=0;t<3;t++){
        const fa=(t-1)*0.25;
        const feather=new THREE.Mesh(new THREE.ConeGeometry(0.1*sc,0.65*sc,4), mChicken);
        feather.rotation.x=-0.8; feather.rotation.z=fa; feather.rotation.y=rot;
        feather.position.set(x-cr*0.5*sc, 0.85*sc, z-sr*0.5*sc); scene.add(feather);
      }
      // wings
      for(const side of[-1,1]){
        const wing=new THREE.Mesh(new THREE.SphereGeometry(0.3*sc,7,5), mChicken);
        wing.scale.set(0.5,0.8,1.1);
        wing.position.set(x+pr*side*0.42*sc, 0.72*sc, z+pz2*side*0.42*sc); scene.add(wing);
      }
      // neck
      const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.14*sc,0.18*sc,0.4*sc,6), mChicken);
      neck.rotation.y=rot;
      neck.position.set(x+cr*0.38*sc, 1.0*sc, z+sr*0.38*sc); scene.add(neck);
      // head
      const head=new THREE.Mesh(new THREE.SphereGeometry(0.26*sc,8,6), mChicken);
      head.position.set(x+cr*0.56*sc, 1.3*sc, z+sr*0.56*sc); scene.add(head);
      // beak
      const beak=new THREE.Mesh(new THREE.ConeGeometry(0.08*sc,0.32*sc,4), new THREE.MeshLambertMaterial({color:0xFFAA00}));
      beak.rotation.z=Math.PI/2; beak.rotation.y=rot;
      beak.position.set(x+cr*0.84*sc, 1.28*sc, z+sr*0.84*sc); scene.add(beak);
      // wattle
      const wattle=new THREE.Mesh(new THREE.SphereGeometry(0.1*sc,6,5), mWattle);
      wattle.scale.set(0.7,1.3,0.7);
      wattle.position.set(x+cr*0.72*sc, 1.15*sc, z+sr*0.72*sc); scene.add(wattle);
      // comb
      for(let c=0;c<3;c++){
        const comb=new THREE.Mesh(new THREE.SphereGeometry(0.09*sc,5,4), mRed);
        comb.position.set(x+cr*0.56*sc+pr*(c-1)*0.09*sc, (1.52+c*0.04)*sc, z+sr*0.56*sc+pz2*(c-1)*0.09*sc);
        scene.add(comb);
      }
      // eyes
      const mEyeC=new THREE.MeshBasicMaterial({color:0x111100});
      const mEyeYC=new THREE.MeshBasicMaterial({color:0xFFCC00});
      for(const side of[-1,1]){
        const eyeY=new THREE.Mesh(new THREE.SphereGeometry(0.075*sc,5,4), mEyeYC);
        eyeY.position.set(x+cr*0.64*sc+pr*side*0.22*sc, 1.36*sc, z+sr*0.64*sc+pz2*side*0.22*sc);
        scene.add(eyeY);
        const eye=new THREE.Mesh(new THREE.SphereGeometry(0.045*sc,5,4), mEyeC);
        eye.position.set(x+cr*0.67*sc+pr*side*0.22*sc, 1.36*sc, z+sr*0.67*sc+pz2*side*0.22*sc);
        scene.add(eye);
      }
      // legs
      for(const side of[-1,1]){
        const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.07*sc,0.06*sc,0.55*sc,5), new THREE.MeshLambertMaterial({color:0xFFAA00}));
        leg.position.set(x+pr*side*0.18*sc, 0.28*sc, z+pz2*side*0.18*sc); scene.add(leg);
        // foot toes
        for(let t=0;t<3;t++){
          const toeA=(t-1)*0.55;
          const toe=new THREE.Mesh(new THREE.CylinderGeometry(0.03*sc,0.02*sc,0.28*sc,4), new THREE.MeshLambertMaterial({color:0xFFAA00}));
          toe.rotation.z=Math.PI/2; toe.rotation.y=rot+toeA;
          toe.position.set(x+pr*side*0.18*sc+cr*Math.cos(toeA)*0.14*sc, 0.03*sc, z+pz2*side*0.18*sc+sr*Math.cos(toeA)*0.14*sc);
          scene.add(toe);
        }
      }
    });

    // Flower patches — bigger petals
    place(12,  SAFE, (x,z)=>{
      const mats=[mFlower1,mFlower2,mFlower3,mFlower4];
      const flMat=mats[Math.floor(Math.random()*4)];
      for(let f=0;f<6;f++){
        const fx=x+(Math.random()-0.5)*4, fz=z+(Math.random()-0.5)*4;
        const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.9,4), mBush);
        stem.position.set(fx,0.45,fz); scene.add(stem);
        const petals=new THREE.Mesh(new THREE.SphereGeometry(0.35,6,4), flMat);
        petals.scale.y=0.4; petals.position.set(fx,0.95,fz); scene.add(petals);
      }
    });

    // Bush clusters — bigger
    place(9,  SAFE, (x,z)=>{
      for(let b=0;b<4;b++){
        const bush=new THREE.Mesh(new THREE.SphereGeometry(1.0+Math.random()*0.6,8,5), mBush);
        bush.position.set(x+(Math.random()-0.5)*3,0.9,z+(Math.random()-0.5)*3);
        scene.add(bush);
      }
    });

    // Rocks — bigger
    place(5,  SAFE, (x,z)=>{
      const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(0.7,0), mRock);
      rock.scale.setScalar(1.0+Math.random()*1.2);
      rock.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
      rock.position.set(x,0.5,z); scene.add(rock);
    });

    // Wooden fence sections — bigger posts/rails
    place(6,  SAFE, (x,z)=>{
      const rot=Math.random()*Math.PI;
      for(let p=0;p<3;p++){
        const post=new THREE.Mesh(new THREE.BoxGeometry(0.28,2.0,0.28), mFence);
        post.position.set(x+Math.cos(rot)*p*2.5,1.0,z+Math.sin(rot)*p*2.5); scene.add(post);
      }
      for(const ry of[0.6,1.3]){
        const rail=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,5.2), mFence);
        rail.position.set(x+Math.cos(rot)*2.5,ry,z+Math.sin(rot)*2.5);
        rail.rotation.y=rot; scene.add(rail);
      }
    });
  }
}

// ── KART MESH ─────────────────────────────────────────────────────────────────
function makeKart(col, acc){
  const g = new THREE.Group();

  const mBody  = new THREE.MeshLambertMaterial({color:col});
  const mAcc   = new THREE.MeshLambertMaterial({color:acc});
  const mBlack = new THREE.MeshLambertMaterial({color:0x111111});
  const mDark  = new THREE.MeshLambertMaterial({color:0x222222});
  const mGrey  = new THREE.MeshLambertMaterial({color:0x888888});
  const mChrome= new THREE.MeshLambertMaterial({color:0xCCCCCC});
  const mGoose = new THREE.MeshLambertMaterial({color:0xF5F0DC});
  const mBeak  = new THREE.MeshLambertMaterial({color:0xFF9900});
  const mEye   = new THREE.MeshBasicMaterial({color:0x111111});
  const mEyeW  = new THREE.MeshBasicMaterial({color:0xFFFFFF});
  const mRed   = new THREE.MeshBasicMaterial({color:0xFF2200});
  const mYellow= new THREE.MeshBasicMaterial({color:0xFFDD00});
  const mExhaust=new THREE.MeshLambertMaterial({color:0x886644});

  function add(geo, mat, x=0, y=0, z=0, rx=0, ry=0, rz=0, sx=1, sy=1, sz=1){
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    m.rotation.set(rx, ry, rz);
    m.scale.set(sx, sy, sz);
    g.add(m); return m;
  }

  // ── CHASSIS ──────────────────────────────────────────────────────────────
  // Main body — low flat slab
  add(new THREE.BoxGeometry(3.0, 0.55, 4.2), mBody, 0, 0.55, 0);
  // Nose cone — tapered front
  add(new THREE.BoxGeometry(2.2, 0.45, 1.2), mAcc,  0, 0.50, 2.7);
  // Rear box — slightly taller
  add(new THREE.BoxGeometry(2.8, 0.65, 1.0), mBody, 0, 0.60, -2.0);
  // Side skirts left & right
  add(new THREE.BoxGeometry(0.25, 0.35, 3.6), mAcc,  -1.55, 0.38, -0.1);
  add(new THREE.BoxGeometry(0.25, 0.35, 3.6), mAcc,   1.55, 0.38, -0.1);
  // Underbody plate
  add(new THREE.BoxGeometry(2.8, 0.12, 4.0), mDark, 0, 0.18, 0);
  // Front splitter
  add(new THREE.BoxGeometry(2.8, 0.1, 0.5), mBlack, 0, 0.3, 3.1);

  // ── COCKPIT / SEAT ───────────────────────────────────────────────────────
  // Seat bucket
  add(new THREE.BoxGeometry(1.4, 0.7, 1.2), mDark, 0, 1.05, -0.3);
  // Seat back
  add(new THREE.BoxGeometry(1.4, 0.8, 0.18), mDark, 0, 1.55, -0.85);
  // Dashboard
  add(new THREE.BoxGeometry(1.8, 0.35, 0.18), mBlack, 0, 1.25, 1.1);
  // Steering wheel
  add(new THREE.TorusGeometry(0.35, 0.06, 6, 12), mChrome, 0, 1.55, 1.05, 0.4, 0, 0);
  // Steering column
  add(new THREE.CylinderGeometry(0.05, 0.05, 0.55, 6), mChrome, 0, 1.2, 1.05, 0.4, 0, 0);

  // ── ROLL CAGE ────────────────────────────────────────────────────────────
  // Two side hoops
  for(const sx of [-1.1, 1.1]){
    add(new THREE.CylinderGeometry(0.07, 0.07, 2.0, 6), mChrome, sx, 1.8, -0.1);
    // Diagonal brace
    add(new THREE.CylinderGeometry(0.05, 0.05, 1.5, 6), mChrome, sx, 1.5, 0.3, 0.55, 0, 0);
  }
  // Top crossbar
  add(new THREE.CylinderGeometry(0.07, 0.07, 2.2, 6), mChrome, 0, 2.75, -0.1, 0, 0, Math.PI/2);

  // ── REAR WING / SPOILER ──────────────────────────────────────────────────
  // Wing endplates
  for(const sx of [-1.3, 1.3]){
    add(new THREE.BoxGeometry(0.1, 0.6, 0.9), mBody, sx, 1.35, -2.15);
  }
  // Wing main plane
  add(new THREE.BoxGeometry(2.6, 0.12, 0.85), mAcc, 0, 1.65, -2.15);
  // Wing support struts
  for(const sx of [-0.8, 0.8]){
    add(new THREE.CylinderGeometry(0.05, 0.05, 0.7, 5), mChrome, sx, 1.05, -2.15, 0.15, 0, 0);
  }

  // ── EXHAUST PIPES ────────────────────────────────────────────────────────
  for(const sx of [-0.7, 0.7]){
    add(new THREE.CylinderGeometry(0.12, 0.1, 0.9, 8), mExhaust, sx, 0.52, -2.55, Math.PI/2, 0, 0);
    // Exhaust tip (darker rim)
    add(new THREE.CylinderGeometry(0.13, 0.13, 0.08, 8), mBlack, sx, 0.52, -3.02, Math.PI/2, 0, 0);
  }

  // ── WHEELS ───────────────────────────────────────────────────────────────
  for(const [wx, wz] of [[-1.65,1.4],[1.65,1.4],[-1.65,-1.5],[1.65,-1.5]]){
    // Tyre
    add(new THREE.CylinderGeometry(0.62, 0.62, 0.55, 12), mBlack, wx, 0.48, wz, 0, 0, Math.PI/2);
    // Rim
    add(new THREE.CylinderGeometry(0.35, 0.35, 0.58, 8), mChrome, wx, 0.48, wz, 0, 0, Math.PI/2);
    // Hubcap centre
    add(new THREE.CylinderGeometry(0.12, 0.12, 0.6, 6), mAcc, wx, 0.48, wz, 0, 0, Math.PI/2);
    // Tyre tread ring
    add(new THREE.TorusGeometry(0.62, 0.06, 4, 12), mDark, wx, 0.48, wz, Math.PI/2, 0, 0);
  }

  // ── GOOSE DRIVER ─────────────────────────────────────────────────────────
  // Body (plump oval)
  const gooseBody = add(new THREE.SphereGeometry(0.72, 10, 8), mGoose, 0, 1.82, 0.1);
  gooseBody.scale.set(1.0, 1.2, 1.1);
  // Wing left
  add(new THREE.SphereGeometry(0.4, 7, 5), mGoose, -0.72, 1.75, 0.0, 0, 0, 0.5, 1, 0.4, 0.7);
  // Wing right
  add(new THREE.SphereGeometry(0.4, 7, 5), mGoose,  0.72, 1.75, 0.0, 0, 0,-0.5, 1, 0.4, 0.7);
  // Neck
  add(new THREE.CylinderGeometry(0.18, 0.26, 0.7, 7), mGoose, 0, 2.45, 0.5, -0.3, 0, 0);
  // Head
  const gooseHead = add(new THREE.SphereGeometry(0.38, 9, 7), mGoose, 0, 2.88, 0.82);
  gooseHead.scale.set(1, 1.05, 1.1);
  // Beak upper
  add(new THREE.BoxGeometry(0.22, 0.1, 0.55), mBeak, 0, 2.88, 1.28);
  // Beak lower
  add(new THREE.BoxGeometry(0.18, 0.08, 0.45), mBeak, 0, 2.78, 1.25);
  // Eyes — white sclera + dark pupil
  for(const sx of [-0.2, 0.2]){
    add(new THREE.SphereGeometry(0.1, 6, 5), mEyeW, sx, 2.95, 1.12);
    add(new THREE.SphereGeometry(0.055, 5, 4), mEye, sx*1.05, 2.96, 1.22);
  }
  // Racing helmet (little cap on head)
  const helmetCol = new THREE.MeshLambertMaterial({color:acc});
  add(new THREE.SphereGeometry(0.41, 8, 6), helmetCol, 0, 3.05, 0.72, 0,0,0, 1, 0.65, 1);
  // Visor
  add(new THREE.BoxGeometry(0.42, 0.1, 0.22), new THREE.MeshBasicMaterial({color:0x88CCFF,transparent:true,opacity:0.7}), 0, 2.95, 1.06);
  // Tail feathers (back of body)
  for(const[tx,tz,tr] of [[0,-0.7,-0.6],[0.25,-0.62,-0.5],[-0.25,-0.62,-0.5]]){
    add(new THREE.ConeGeometry(0.12, 0.55, 5), mGoose, tx, 1.85+tz*0.1, tz, tr, 0, tx*0.3);
  }

  // ── RACING NUMBER PLATE ──────────────────────────────────────────────────
  add(new THREE.BoxGeometry(0.9, 0.45, 0.08), new THREE.MeshBasicMaterial({color:0xFFFFFF}), 0, 0.75, 3.22);

  // ── HEADLIGHTS ───────────────────────────────────────────────────────────
  for(const lx of [-0.75, 0.75]){
    add(new THREE.SphereGeometry(0.18, 7, 5), mYellow, lx, 0.7, 3.05);
    // Lens rim
    add(new THREE.TorusGeometry(0.18, 0.04, 5, 10), mChrome, lx, 0.7, 3.05, Math.PI/2, 0, 0);
  }
  // Rear lights
  for(const lx of [-0.75, 0.75]){
    add(new THREE.SphereGeometry(0.15, 7, 5), mRed, lx, 0.7, -2.65);
  }

  return g;
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnKarts(){
  const p0=trackPts[0],p1=trackPts[1];
  const fdx=p1.x-p0.x,fdz=p1.z-p0.z,fl=Math.sqrt(fdx*fdx+fdz*fdz)||1;
  const fwd={x:fdx/fl,z:fdz/fl},right={x:-fwd.z,z:fwd.x};
  const startAngle=Math.atan2(-fwd.x,-fwd.z);
  const slots=[{c:1,r:0},{c:-1,r:0},{c:1,r:1},{c:-1,r:1}];
  function gpos(i){
    const{c,r}=slots[i];
    return new THREE.Vector3(p0.x+right.x*c*7-fwd.x*(r*10+6),0,p0.z+right.z*c*7-fwd.z*(r*10+6));
  }
  const ch=selChar;
  player={mesh:makeKart(ch.color,ch.accent),pos:gpos(0),angle:startAngle,spd:0,
    cp:0,lap:1,totalCPs:0,done:false,stunned:0,boost:0,abReady:true,abCd:0,char:ch,prevFinishSide:null,prevPos:null};
  player.mesh.position.copy(player.pos);player.mesh.rotation.y=startAngle;scene.add(player.mesh);
  bots=[];
  CHARS.filter(c=>c.id!==ch.id).slice(0,3).forEach((bc,i)=>{
    const isRacer=bc.id==='racer';
    const b={mesh:makeKart(bc.color,bc.accent),pos:gpos(i+1),angle:startAngle,spd:0,
      cp:0,lap:1,totalCPs:0,done:false,stunned:0,boost:0,abReady:true,abCd:0,char:bc,aiTgt:5,
      lookahead:isRacer?42:[30,22,26][i]??24, laneOffset:isRacer?0:[-3,3,0][i]??0, prevFinishSide:null,prevPos:null};
    b.mesh.position.copy(b.pos);b.mesh.rotation.y=startAngle;scene.add(b.mesh);bots.push(b);
  });
}

// ── BARRIER COLLISION ─────────────────────────────────────────────────────────
// ── BARRIER COLLISION ─────────────────────────────────────────────────────────
// Collides kart against the exact barrier segment positions stored in barrierSegs.
// For each segment we find the closest point on the line, then if the kart centre
// is within KART_R of it we push the kart away and reflect its speed.
const KART_R = 2.0;

function barrierCollide(k){
  for(let s=0;s<barrierSegs.length;s++){
    const {ax,az,bx,bz}=barrierSegs[s];
    const sdx=bx-ax, sdz=bz-az;
    const sl2=sdx*sdx+sdz*sdz; if(sl2<0.0001) continue;
    const t=Math.max(0,Math.min(1,((k.pos.x-ax)*sdx+(k.pos.z-az)*sdz)/sl2));
    const cx=ax+t*sdx, cz=az+t*sdz;
    const dx=k.pos.x-cx, dz=k.pos.z-cz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<KART_R && dist>0.001){
      // Push kart away from barrier surface
      const nx=dx/dist, nz=dz/dist;
      k.pos.x=cx+nx*KART_R;
      k.pos.z=cz+nz*KART_R;
      // Cancel velocity into the wall, keep sliding component
      const vx=-Math.sin(k.angle)*k.spd, vz=-Math.cos(k.angle)*k.spd;
      const vn=vx*nx+vz*nz;
      if(vn<0){
        k.spd*=0.25;
        if(k===player&&Math.abs(k.spd)>0.1)SFX.stunned();
      }
      break; // one collision per frame is enough
    }
  }
}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
function updatePlayer(dt){
  const k=player;
  const ms=k.boost>0?MAXSPD*k.char.spd*(k.boostMult||1.7):MAXSPD*k.char.spd;
  if(k.stunned>0){k.stunned-=dt*1000;k.spd*=0.9;}
  else{
    if(k.boost>0)k.boost-=dt*1000;
    if(keys['KeyW']||keys['ArrowUp'])k.spd=Math.min(k.spd+ACC,ms);
    else if(keys['KeyS']||keys['ArrowDown'])k.spd=Math.max(k.spd-BRK,-ms*0.35);
    else{k.spd*=(1-FRIC);if(Math.abs(k.spd)<0.001)k.spd=0;}
    const tr=TURN*k.char.hdl*Math.min(Math.abs(k.spd)/MAXSPD+0.3,1);
    if(keys['KeyA']||keys['ArrowLeft'])k.angle+=tr;
    if(keys['KeyD']||keys['ArrowRight'])k.angle-=tr;
  }
  k.pos.x-=Math.sin(k.angle)*k.spd;k.pos.z-=Math.cos(k.angle)*k.spd;
  barrierCollide(k);
  k.mesh.position.set(k.pos.x,0,k.pos.z);k.mesh.rotation.y=k.angle;
  tickCD(k,dt);checkCP(k,true);
}

function updateBot(b,dt){
  const BOT_SPD=selDiff.spdMult;
  const ms=b.boost>0?MAXSPD*b.char.spd*BOT_SPD*(b.boostMult||1.7):MAXSPD*b.char.spd*BOT_SPD;

  // ── LOOKAHEAD TARGET ───────────────────────────────────────────────────────
  // Use two targets: a close one for steering and a far one to detect upcoming corners
  const tgtIdx=(b.aiTgt+selDiff.lookahead)%NCP;
  const farIdx=(b.aiTgt+selDiff.lookahead+25)%NCP;
  const tgt=trackPts[tgtIdx];
  const farTgt=trackPts[farIdx];

  // Compute track right-normal at target to apply lane offset
  const nextTgt=trackPts[(tgtIdx+1)%NCP];
  const tdx=nextTgt.x-tgt.x, tdz=nextTgt.z-tgt.z, tl=Math.sqrt(tdx*tdx+tdz*tdz)||1;
  const trtx=-tdz/tl, trtz=tdx/tl;
  const dx=(tgt.x+trtx*b.laneOffset)-b.pos.x, dz=(tgt.z+trtz*b.laneOffset)-b.pos.z;

  // Advance base waypoint when close enough
  if(Math.sqrt(dx*dx+dz*dz)<7){
    b.aiTgt=(b.aiTgt+3)%NCP;
  }

  // ── CORNER LOOKAHEAD ───────────────────────────────────────────────────────
  // Measure how much the track curves ahead by comparing near and far target angles
  const nearAng=Math.atan2(tgt.x-b.pos.x, tgt.z-b.pos.z);
  const farAng=Math.atan2(farTgt.x-b.pos.x, farTgt.z-b.pos.z);
  let curvature=Math.abs(farAng-nearAng);
  while(curvature>Math.PI)curvature=Math.abs(curvature-Math.PI*2);

  // ── KART REPULSION ─────────────────────────────────────────────────────────
  const KART_SENSE=8;
  let kartPushX=0, kartPushZ=0;
  const others=[player,...bots.filter(x=>x!==b)];
  for(const o of others){
    const kx=b.pos.x-o.pos.x, kz=b.pos.z-o.pos.z;
    const kdist=Math.sqrt(kx*kx+kz*kz);
    if(kdist<KART_SENSE && kdist>0.001){
      const strength=(KART_SENSE-kdist)/KART_SENSE;
      kartPushX+=kx/kdist*strength;
      kartPushZ+=kz/kdist*strength;
    }
  }

  // ── WALL AVOIDANCE ─────────────────────────────────────────────────────────
  const WALL_SENSE=9;
  let wallPushX=0, wallPushZ=0;
  for(let s=0;s<barrierSegs.length;s++){
    const {ax,az,bx,bz}=barrierSegs[s];
    const sdx=bx-ax, sdz=bz-az;
    const sl2=sdx*sdx+sdz*sdz; if(sl2<0.0001) continue;
    const t=Math.max(0,Math.min(1,((b.pos.x-ax)*sdx+(b.pos.z-az)*sdz)/sl2));
    const cx=ax+t*sdx, cz=az+t*sdz;
    const wx=b.pos.x-cx, wz=b.pos.z-cz;
    const dist=Math.sqrt(wx*wx+wz*wz);
    if(dist<WALL_SENSE && dist>0.001){
      const strength=((WALL_SENSE-dist)/WALL_SENSE)**2;
      wallPushX+=wx/dist*strength*1.8;
      wallPushZ+=wz/dist*strength*1.8;
    }
  }

  // ── STEERING ───────────────────────────────────────────────────────────────
  let ta=Math.atan2(-dx,-dz);
  if(wallPushX!==0||wallPushZ!==0){
    const wallAng=Math.atan2(-wallPushX,-wallPushZ);
    let wda=wallAng-ta;
    while(wda>Math.PI)wda-=Math.PI*2;
    while(wda<-Math.PI)wda+=Math.PI*2;
    const wallStrength=Math.min(Math.sqrt(wallPushX*wallPushX+wallPushZ*wallPushZ),1);
    ta+=wda*wallStrength*0.9;
  }
  if(kartPushX!==0||kartPushZ!==0){
    const kartAng=Math.atan2(-kartPushX,-kartPushZ);
    let kda=kartAng-ta;
    while(kda>Math.PI)kda-=Math.PI*2;
    while(kda<-Math.PI)kda+=Math.PI*2;
    const kartStrength=Math.min(Math.sqrt(kartPushX*kartPushX+kartPushZ*kartPushZ),1);
    ta+=kda*kartStrength*0.5;
  }

  // ── EGG AVOIDANCE ──────────────────────────────────────────────────────────
  const EGG_SENSE=9;
  let eggPushX=0, eggPushZ=0;
  for(const e of eggs){
    if(e.triggered) continue;
    const ex=b.pos.x-e.pos.x, ez=b.pos.z-e.pos.z;
    const edist=Math.sqrt(ex*ex+ez*ez);
    if(edist<EGG_SENSE && edist>0.001){
      if(Math.random()<0.015) continue;
      const strength=(EGG_SENSE-edist)/EGG_SENSE;
      eggPushX+=ex/edist*strength;
      eggPushZ+=ez/edist*strength;
    }
  }
  if(eggPushX!==0||eggPushZ!==0){
    const eggAng=Math.atan2(-eggPushX,-eggPushZ);
    let eda=eggAng-ta;
    while(eda>Math.PI)eda-=Math.PI*2;
    while(eda<-Math.PI)eda+=Math.PI*2;
    const eggStrength=Math.min(Math.sqrt(eggPushX*eggPushX+eggPushZ*eggPushZ),1)*0.55;
    ta+=eda*eggStrength;
  }

  // ── TRACK HAZARD AVOIDANCE ─────────────────────────────────────────────────
  // Bots probe ahead along their heading to detect hazards early
  const HAZARD_SENSE=18;
  const HAZARD_LOOKAHEAD=12;
  let hazPushX=0, hazPushZ=0;
  for(const h of trackHazards){
    if(h.triggered||h.removed) continue;
    for(const probeScale of [0, 0.5, 1.0]){
      const probeX=b.pos.x - Math.sin(b.angle)*HAZARD_LOOKAHEAD*probeScale;
      const probeZ=b.pos.z - Math.cos(b.angle)*HAZARD_LOOKAHEAD*probeScale;
      const hx=probeX-h.x, hz=probeZ-h.z;
      const hdist=Math.sqrt(hx*hx+hz*hz);
      if(hdist<HAZARD_SENSE && hdist>0.001){
        const strength=((HAZARD_SENSE-hdist)/HAZARD_SENSE)**1.5*(probeScale===0?2.5:1.8);
        const bx=b.pos.x-h.x, bz=b.pos.z-h.z;
        const bd=Math.sqrt(bx*bx+bz*bz)||1;
        hazPushX+=bx/bd*strength;
        hazPushZ+=bz/bd*strength;
      }
    }
  }
  if(hazPushX!==0||hazPushZ!==0){
    const hazAng=Math.atan2(-hazPushX,-hazPushZ);
    let hda=hazAng-ta;
    while(hda>Math.PI)hda-=Math.PI*2;
    while(hda<-Math.PI)hda+=Math.PI*2;
    const hazStrength=Math.min(Math.sqrt(hazPushX*hazPushX+hazPushZ*hazPushZ),1)*0.85;
    ta+=hda*hazStrength;
    const closestHaz=trackHazards.filter(h=>!h.triggered&&!h.removed)
      .reduce((mn,h)=>{ const d=Math.hypot(b.pos.x-h.x,b.pos.z-h.z); return d<mn?d:mn; },Infinity);
    if(closestHaz<HAZARD_SENSE*0.6) b.spd*=0.97;
  }

  let da=ta-b.angle;
  while(da>Math.PI)da-=Math.PI*2;
  while(da<-Math.PI)da+=Math.PI*2;
  // Bots turn faster than player so they can handle corners properly
  b.angle+=Math.sign(da)*Math.min(Math.abs(da),TURN*selDiff.turnMult*b.char.hdl);

  // ── SPEED ──────────────────────────────────────────────────────────────────
  if(b.stunned>0){
    b.stunned-=dt*1000; b.spd*=0.88;
  } else {
    // Brake for sharp corners using lookahead curvature + immediate steering angle
    const steerAngle=Math.abs(da);
    const cornerLoad=Math.max(steerAngle*selDiff.cornerLoad, curvature*selDiff.cornerLoad*0.8);
    const cornerSlow=1-Math.min(cornerLoad, 0.3);
    const topSpd=ms*cornerSlow;
    if(b.spd>topSpd) b.spd=Math.max(b.spd-BRK*1.2, topSpd);
    else b.spd=Math.min(b.spd+ACC*selDiff.accel, topSpd);
    if(b.boost>0) b.boost-=dt*1000;
  }

  b.pos.x-=Math.sin(b.angle)*b.spd;
  b.pos.z-=Math.cos(b.angle)*b.spd;
  barrierCollide(b);
  b.mesh.position.set(b.pos.x,0,b.pos.z);
  b.mesh.rotation.y=b.angle;
  tickCDBot(b,dt); botAI(b); checkCP(b,false);
}

function tickCD(k,dt){if(!k.abReady){k.abCd=Math.max(0,k.abCd-dt*1000);if(k.abCd<=0)k.abReady=true;}}
function tickCDBot(b,dt){if(!b.abReady){b.abCd=Math.max(0,b.abCd-dt*1000*(1/(selDiff.cdMult||1)));if(b.abCd<=0)b.abReady=true;}}

function segmentsIntersect(ax,az,bx,bz,cx,cz,dx,dz){
  // Returns true if segment AB crosses segment CD
  const d1x=bx-ax,d1z=bz-az,d2x=dx-cx,d2z=dz-cz;
  const cross=d1x*d2z-d1z*d2x;
  if(Math.abs(cross)<1e-10)return false;
  const t=((cx-ax)*d2z-(cz-az)*d2x)/cross;
  const u=((cx-ax)*d1z-(cz-az)*d1x)/cross;
  return t>=0&&t<=1&&u>=0&&u<=1;
}

function checkCP(k,isPlayer){
  // Advance intermediate checkpoints by proximity (skip index 0 — that's the finish line)
  const next=(k.cp+1)%NCP;
  if(next!==0&&Math.hypot(k.pos.x-trackPts[next].x,k.pos.z-trackPts[next].z)<18){
    k.cp=next;k.totalCPs++;
  }

  // Lap counting: segment intersection with the visible finish line
  // Only arm it when past 70% of checkpoints so we don't trigger on the opening straight
  if(finishLine&&k.prevPos&&k.cp>NCP*0.7){
    const crossed=segmentsIntersect(
      k.prevPos.x,k.prevPos.z, k.pos.x,k.pos.z,
      finishLine.ax,finishLine.az, finishLine.bx,finishLine.bz
    );
    if(crossed){
      // Make sure we're crossing in the forward direction
      const dvx=k.pos.x-k.prevPos.x,dvz=k.pos.z-k.prevPos.z;
      const fwd=dvx*finishLine.fx+dvz*finishLine.fz;
      if(fwd>0){
        k.cp=0;k.totalCPs++;k.lap++;
        if(isPlayer){
          if(k.lap>NLAPS){endRace();return;}
          floatMsg('🏁 LAP '+k.lap+'!','#FFD700');
          SFX.lapComplete();
          spawnTrackHazard();
        }
      }
    }
  }

  // Store position for next frame's intersection test
  k.prevPos={x:k.pos.x,z:k.pos.z};
}

function getPos(){
  let pos=1;for(const b of bots)if(b.totalCPs>player.totalCPs)pos++;return pos;
}

function resolveCollisions(){
  const all=[player,...bots],R=2.6,D=R*2;
  for(let i=0;i<all.length;i++)for(let j=i+1;j<all.length;j++){
    const a=all[i],b=all[j],dx=b.pos.x-a.pos.x,dz=b.pos.z-a.pos.z;
    const dist=Math.sqrt(dx*dx+dz*dz)||0.001;
    if(dist<D){
      const nx=dx/dist,nz=dz/dist,ov=(D-dist)/2;
      a.pos.x-=nx*ov;a.pos.z-=nz*ov;b.pos.x+=nx*ov;b.pos.z+=nz*ov;
      a.mesh.position.set(a.pos.x,0,a.pos.z);b.mesh.position.set(b.pos.x,0,b.pos.z);
      const imp=(a.spd-b.spd)*0.4;a.spd-=imp;b.spd+=imp;
    }
  }
}

// ── PROJECTILES ───────────────────────────────────────────────────────────────
function updateProjs(dt){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];p.life-=dt*1000;

    // Mild heat seeking — nudge velocity toward nearest victim
    let nearestDist=Infinity, nearestV=null;
    for(const v of p.victims){
      const d=Math.hypot(p.pos.x-v.pos.x,p.pos.z-v.pos.z);
      if(d<nearestDist){nearestDist=d;nearestV=v;}
    }
    if(nearestV&&nearestDist<40){
      const tdx=nearestV.pos.x-p.pos.x, tdz=nearestV.pos.z-p.pos.z;
      const tl=Math.sqrt(tdx*tdx+tdz*tdz)||1;
      p.dx+=(tdx/tl*1.4-p.dx)*0.04; // gently blend toward target direction
      p.dz+=(tdz/tl*1.4-p.dz)*0.04;
    }

    p.pos.x+=p.dx;p.pos.z+=p.dz;
    p.mesh.position.set(p.pos.x,1.2,p.pos.z);
    // Spin the feather on its travel axis and wobble up/down slightly
    p.mesh.rotation.y+=(p.spin||0.18);
    p.mesh.position.y=1.2+Math.sin(p.life*0.008)*0.4;
    // Point mesh in direction of travel
    p.mesh.rotation.y=Math.atan2(-p.dx,-p.dz);
    let hit=false;
    for(const v of p.victims)if(Math.hypot(p.pos.x-v.pos.x,p.pos.z-v.pos.z)<5.0){v.stunned=1400;hit=true;break;}
    if(hit||p.life<=0){scene.remove(p.mesh);projs.splice(i,1);}
  }
}

// ── SHOCKWAVES ────────────────────────────────────────────────────────────────
function spawnShockwave(pos,col,victims){
  const mat=new THREE.MeshBasicMaterial({color:col,side:THREE.DoubleSide,transparent:true,opacity:0.9});
  const mesh=new THREE.Mesh(new THREE.RingGeometry(0.5,1.8,32),mat);
  mesh.rotation.x=-Math.PI/2;mesh.position.set(pos.x,0.4,pos.z);scene.add(mesh);
  shockwaves.push({mesh,mat,radius:1.8,ox:pos.x,oz:pos.z,victims,hit:new Set()});
}

function updateShockwaves(dt){
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];sw.radius+=40*dt;
    sw.mat.opacity=0.85*(1-sw.radius/45);
    const s=sw.radius/1.8;sw.mesh.scale.set(s,s,s);
    for(const v of sw.victims){
      if(!sw.hit.has(v)&&Math.hypot(v.pos.x-sw.ox,v.pos.z-sw.oz)<=sw.radius){v.stunned=900;sw.hit.add(v);}
    }
    if(sw.radius>=45){scene.remove(sw.mesh);sw.mat.dispose();shockwaves.splice(i,1);}
  }
}

// ── EGGS ──────────────────────────────────────────────────────────────────────
function spawnEggs(k,victims){
  // Drop 1 large egg directly behind the kart
  const behindX=k.pos.x+Math.sin(k.angle)*6;
  const behindZ=k.pos.z+Math.cos(k.angle)*6;

  // Egg mesh — squashed sphere, shiny gold
  const mat=new THREE.MeshPhongMaterial({
    color:0xD4920A, emissive:0x7A4400, emissiveIntensity:0.35,
    specular:0xFFFFFF, shininess:400
  });
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(1.0,16,12),mat);
  mesh.scale.set(0.85,1.2,0.85);
  // Bright shimmer spot
  const shimmerMat=new THREE.MeshBasicMaterial({color:0xFFFFDD,transparent:true,opacity:0.6});
  const shimmer=new THREE.Mesh(new THREE.SphereGeometry(0.28,8,6),shimmerMat);
  shimmer.position.set(0.3,0.6,0.5);
  mesh.add(shimmer);
  mesh.position.set(behindX,0.5,behindZ);
  mesh.rotation.y=Math.random()*Math.PI*2;
  scene.add(mesh);
  eggs.push({mesh,pos:new THREE.Vector3(behindX,0,behindZ),victims,triggered:false});
}

function spawnEggSplatter(pos){
  // Splat decal — flat ellipse on the ground
  const splatMat=new THREE.MeshBasicMaterial({color:0xD4920A,transparent:true,opacity:0.85});
  const splat=new THREE.Mesh(new THREE.CircleGeometry(2.2,16),splatMat);
  splat.rotation.x=-Math.PI/2;
  splat.position.set(pos.x,0.05,pos.z);
  scene.add(splat);

  // Yolk blob — bright orange circle in centre
  const yolkMat=new THREE.MeshBasicMaterial({color:0xFF8800,transparent:true,opacity:0.9});
  const yolk=new THREE.Mesh(new THREE.CircleGeometry(0.9,12),yolkMat);
  yolk.rotation.x=-Math.PI/2;
  yolk.position.set(pos.x,0.06,pos.z);
  scene.add(yolk);

  // Shell shards — small flat triangles flung outward
  const shardMat=new THREE.MeshBasicMaterial({color:0xD4920A,side:THREE.DoubleSide});
  const shards=[];
  for(let s=0;s<8;s++){
    const ang=s/8*Math.PI*2+Math.random()*0.4;
    const dist=1.5+Math.random()*2.5;
    const shard=new THREE.Mesh(new THREE.ConeGeometry(0.25+Math.random()*0.2,0.5+Math.random()*0.4,3),shardMat);
    shard.rotation.x=-Math.PI/2;
    shard.rotation.z=ang;
    shard.position.set(pos.x+Math.cos(ang)*dist,0.08,pos.z+Math.sin(ang)*dist);
    scene.add(shard);
    shards.push(shard);
  }

  // Fade everything out after 2 seconds
  let age=0;
  const fadeInt=setInterval(()=>{
    age+=0.05;
    const op=Math.max(0,1-age/2);
    splatMat.opacity=0.85*op;
    yolkMat.opacity=0.9*op;
    shardMat.opacity=op;
    if(age>=2){
      clearInterval(fadeInt);
      scene.remove(splat);scene.remove(yolk);
      shards.forEach(s=>scene.remove(s));
    }
  },50);
}

function updateEggs(dt){
  for(let i=eggs.length-1;i>=0;i--){
    const e=eggs[i];
    // Gentle bob
    e.mesh.position.y=0.4+Math.sin(Date.now()*0.004+i)*0.1;
    e.mesh.rotation.y+=0.02;
    if(!e.triggered){
      for(const v of e.victims){
        if(Math.hypot(e.pos.x-v.pos.x,e.pos.z-v.pos.z)<3.0){
          v.stunned=1000;
          SFX.eggSplat();
          e.triggered=true;
          // Crack: quickly scale up then vanish
          const pos=e.pos.clone();
          e.mesh.scale.set(1.4,0.2,1.4); // squash flat like it cracked
          scene.remove(e.mesh);
          eggs.splice(i,1);
          spawnEggSplatter(pos);
          break;
        }
      }
    }
  }
}


function spawnTrackHazard(){
  // Remove any existing hazard first
  trackHazards.forEach(h=>scene.remove(h.group));
  trackHazards.length=0;

  // Place hazard at ~40% around the track (well away from start)
  const idx=Math.floor(NCP*0.40);
  const pt=trackPts[idx];
  const x=pt.x, z=pt.z;
  const id=selTrack.id;
  const group=new THREE.Group();

  if(id==='snow'){
    // Ice spike cluster — jagged cyan/white cones bursting from ground
    const iceMat=new THREE.MeshPhongMaterial({color:0xAAEEFF,transparent:true,opacity:0.85,shininess:200,specular:0xffffff});
    const positions=[[0,0],[3.2,1.8],[-2.5,1.2],[ 1.2,-3.0],[-1.8,-1.8]];
    positions.forEach(([ox,oz])=>{
      const h=5+Math.random()*3;
      const spike=new THREE.Mesh(new THREE.ConeGeometry(0.9+Math.random()*0.5,h,6),iceMat);
      spike.position.set(ox,h/2,oz);
      spike.rotation.y=Math.random()*Math.PI;
      spike.rotation.z=(Math.random()-0.5)*0.3;
      group.add(spike);
    });
  } else if(id==='forest'){
    // Log pile — natural but readable
    const logMat=new THREE.MeshLambertMaterial({color:0x5a3010});
    const endMat=new THREE.MeshLambertMaterial({color:0x7a3e18});
    // Each log: radius, length, x position, y height, z depth, y-rotation (slight angle)
    const logs=[
      // Bottom row: 4 logs, slightly varied thickness and tiny z shifts
      {r:0.80, len:8.5, x:-4.2, y:0.80, z: 0.2,  ry: 0.04},
      {r:0.75, len:8.0, x:-1.4, y:0.75, z:-0.3,  ry:-0.05},
      {r:0.78, len:8.2, x: 1.4, y:0.78, z: 0.4,  ry: 0.03},
      {r:0.72, len:7.8, x: 4.0, y:0.72, z:-0.2,  ry:-0.06},
      // Second row: 3 logs nestled in gaps, slightly different lengths
      {r:0.72, len:7.5, x:-2.8, y:2.10, z: 0.1,  ry:-0.04},
      {r:0.70, len:7.8, x: 0.0, y:2.08, z:-0.4,  ry: 0.06},
      {r:0.68, len:7.2, x: 2.8, y:2.12, z: 0.5,  ry:-0.03},
      // Top row: 2 logs
      {r:0.65, len:7.0, x:-1.4, y:3.28, z:-0.1,  ry: 0.05},
      {r:0.63, len:6.8, x: 1.4, y:3.30, z: 0.3,  ry:-0.07},
    ];
    logs.forEach(({r,len,x,y,z,ry})=>{
      const log=new THREE.Mesh(new THREE.CylinderGeometry(r,r*0.95,len,12),logMat);
      log.rotation.order='YXZ';
      log.rotation.z=Math.PI/2;
      log.rotation.y=ry;
      log.position.set(x,y,z);
      group.add(log);
      // End caps
      [-1,1].forEach(side=>{
        const cap=new THREE.Mesh(new THREE.CircleGeometry(r,12),endMat);
        cap.rotation.y=Math.PI/2;
        cap.position.set(x + side*(len/2)*Math.cos(ry), y, z + side*(len/2)*Math.sin(ry));
        group.add(cap);
      });
    });
  } else {
    // Grass — hay bales scattered across the track
    const hayMat=new THREE.MeshLambertMaterial({color:0xD4A820});
    const bandMat=new THREE.MeshLambertMaterial({color:0xB8860B});
    [[-5,0],[0,2.5],[5,-1.5]].forEach(([ox,oz])=>{
      const bale=new THREE.Mesh(new THREE.CylinderGeometry(2.4,2.4,3.2,12),hayMat);
      bale.rotation.z=Math.PI/2;
      bale.position.set(ox,1.6,oz);
      group.add(bale);
      // Twine band
      const band=new THREE.Mesh(new THREE.CylinderGeometry(2.42,2.42,0.35,12),bandMat);
      band.rotation.z=Math.PI/2;
      band.position.set(ox,1.6,oz);
      group.add(band);
    });
  }

  group.position.set(x,0,z);
  scene.add(group);
  trackHazards.push({group,x,z,triggered:false});
}

function updateTrackHazards(dt){
  const all=[player,...bots];
  for(let i=trackHazards.length-1;i>=0;i--){
    const h=trackHazards[i];
    if(h.triggered){
      h.breakT=(h.breakT||0)+dt;
      const t=Math.min(h.breakT*2,1);
      h.group.scale.set(1+t*0.5, Math.max(0.01,1-t), 1+t*0.5);
      if(h.breakT>0.5 && !h.removed){
        scene.remove(h.group);
        h.removed=true;
        // Respawn after 5 seconds
        setTimeout(()=>{ if(racing) spawnTrackHazard(); }, 5000);
      }
      if(h.removed){ trackHazards.splice(i,1); }
      continue;
    }
    for(const k of all){
      if(Math.hypot(k.pos.x-h.x,k.pos.z-h.z)<5.5){
        k.stunned=1200;
        SFX.hazardHit(selTrack.id);
        h.triggered=true;
        h.breakT=0;
        break;
      }
    }
  }
}

function useAbility(k,victims){
  if(!k.abReady)return;
  k.abReady=false;k.abCd=k.char.cd;
  const ip=k===player;
  if(k.char.id==='honker'){
    spawnShockwave(k.pos,0xFFDD00,victims);
    SFX.honk();
    if(ip){flash('#FFD700',0.45);floatMsg('💛 MEGA HONK!','#FFD700');}
  } else if(k.char.id==='canada'){
    // Aim at the nearest victim that is ahead of the kart
    let aimAng=k.angle;
    let bestDist=Infinity;
    for(const v of victims){
      const vdx=v.pos.x-k.pos.x, vdz=v.pos.z-k.pos.z;
      const dist=Math.sqrt(vdx*vdx+vdz*vdz);
      // Check if victim is roughly in front (dot product with facing dir > 0)
      const facingX=-Math.sin(k.angle), facingZ=-Math.cos(k.angle);
      const dot=vdx/dist*facingX+vdz/dist*facingZ;
      if(dot>0.3 && dist<bestDist){ bestDist=dist; aimAng=Math.atan2(-vdx,-vdz); }
    }
    const group=new THREE.Group();
    // Main quill shaft — long bright white cylinder
    const shaft=new THREE.Mesh(
      new THREE.CylinderGeometry(0.12,0.45,3.8,8),
      new THREE.MeshBasicMaterial({color:0xFFFFFF})
    );
    shaft.rotation.x=Math.PI/2;
    group.add(shaft);
    // Bright yellow-gold quill base
    const base=new THREE.Mesh(
      new THREE.SphereGeometry(0.55,8,6),
      new THREE.MeshBasicMaterial({color:0xFFEE44})
    );
    base.position.set(0,0,0.8);
    group.add(base);
    // Glowing cyan tip
    const tip=new THREE.Mesh(
      new THREE.SphereGeometry(0.38,8,6),
      new THREE.MeshBasicMaterial({color:0x44FFFF})
    );
    tip.position.set(0,0,-1.6);
    group.add(tip);
    group.rotation.y=aimAng;
    group.position.set(k.pos.x,1.4,k.pos.z);
    scene.add(group);
    const pm={mesh:group,pos:k.pos.clone(),dx:-Math.sin(aimAng)*1.4,dz:-Math.cos(aimAng)*1.4,life:5500,victims,spin:0.14};
    projs.push(pm);
    if(ip){flash('#FFFFFF',0.35);floatMsg('🪶 FEATHER BLAST!','#fff');}
    SFX.featherBlast();
  } else if(k.char.id==='golden'){
    spawnEggs(k,victims);
    if(ip){flash('#FFD700',0.45);floatMsg('🥚 EGG DROP!','#FFD700');}
    SFX.eggDrop();
  }
  // racer has no ability — cd:99999 means this is never reached
}

function botAI(b){
  if(!b.abReady||raceStartTimer<3)return;
  const others=[player,...bots.filter(x=>x!==b)];
  if(b.char.id==='canada'){
    // Only fire if a target is ahead and within range
    const facingX=-Math.sin(b.angle), facingZ=-Math.cos(b.angle);
    const target=others.find(k=>{
      const dx=k.pos.x-b.pos.x, dz=k.pos.z-b.pos.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>30||dist<0.001)return false;
      const dot=dx/dist*facingX+dz/dist*facingZ;
      return dot>0.5; // must be within ~60° cone ahead
    });
    if(target)useAbility(b,others);
  } else if(b.char.id==='golden'){
    // Drop eggs if someone is close behind
    const facingX=-Math.sin(b.angle), facingZ=-Math.cos(b.angle);
    const behind=others.some(k=>{
      const dx=k.pos.x-b.pos.x, dz=k.pos.z-b.pos.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>22||dist<0.001)return false;
      const dot=dx/dist*facingX+dz/dist*facingZ;
      return dot<-0.3; // behind
    });
    if(behind)useAbility(b,others);
  } else if(b.char.id==='racer'){
    return; // no ability — pure racer
  } else {
    // honker — use when anyone is nearby
    const near=others.some(k=>Math.hypot(b.pos.x-k.pos.x,b.pos.z-k.pos.z)<20);
    if(near)useAbility(b,others);
  }
}

function updateHUD(dt){
  raceTime+=dt;

  document.getElementById('posd').textContent='POS '+getPos()+'/4';

function drawMinimap(){
  const c=mmCtx,W=110,sc=0.48;
  c.clearRect(0,0,W,W);c.fillStyle='rgba(0,0,0,.75)';c.fillRect(0,0,W,W);
  c.strokeStyle='#666';c.lineWidth=5;c.beginPath();
  trackPts.forEach((p,i)=>{const x=W/2+p.x*sc,y=W/2+p.z*sc;i===0?c.moveTo(x,y):c.lineTo(x,y);});
  c.closePath();c.stroke();
  c.fillStyle='#FF4444';
  for(const b of bots){c.beginPath();c.arc(W/2+b.pos.x*sc,W/2+b.pos.z*sc,3,0,Math.PI*2);c.fill();}
  c.fillStyle='#FFD700';c.beginPath();c.arc(W/2+player.pos.x*sc,W/2+player.pos.z*sc,5,0,Math.PI*2);c.fill();
}

function flash(col,op){
  const el=document.getElementById('flash');el.style.background=col;el.style.opacity=op;
  setTimeout(()=>el.style.opacity=0,280);
}
function floatMsg(txt,col){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:44px;font-weight:900;color:'+col+';text-shadow:3px 3px 0 #000;pointer-events:none;z-index:80;animation:ft 1s ease forwards;';
  d.textContent=txt;
  if(!document.getElementById('ftStyle')){
    const s=document.createElement('style');s.id='ftStyle';
    s.textContent='@keyframes ft{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}100%{opacity:0;transform:translate(-50%,-90%) scale(1.1)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(d);setTimeout(()=>d.remove(),1000);
}

// ── FINISH ────────────────────────────────────────────────────────────────────
function endRace(){
  if(finished)return;finished=true;player.done=true;
  trackHazards.forEach(h=>scene.remove(h.group));trackHazards.length=0;
  SFX.stopEngine();
  MUSIC.stop();
  const pos=getPos(),m=Math.floor(raceTime/60),s=(raceTime%60).toFixed(2);
  SFX.raceFinish(pos===1);
  document.getElementById('fintitle').textContent=pos===1?'🏆 WINNER! HONK HONK!':'🏁 RACE OVER!';
  document.getElementById('finpos').textContent=['🥇 1ST PLACE!','🥈 2ND PLACE','🥉 3RD PLACE','4TH PLACE'][pos-1]||pos+'TH';
  document.getElementById('fintm').textContent='Time: '+m+':'+s.padStart(5,'0');
  document.getElementById('fin').style.display='flex';
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function startCD(){
  cdActive=true;const el=document.getElementById('cdtxt');el.style.display='flex';
  const seq=['3','2','1','GO! 🪿'];let i=0;
  function tick(){
    el.textContent=seq[i];
    SFX.countdownBeep(i===seq.length-1);
    i++;
    if(i<seq.length)setTimeout(tick,900);
    else setTimeout(()=>{
      el.style.display='none';cdActive=false;racing=true;
      SFX.startEngine();
      MUSIC.play(selTrack.id);
      bots.forEach(b=>{b.spd=MAXSPD*selDiff.launchSpd;});
      spawnTrackHazard();
    },700);
  }
  tick();
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  if(!player)return;
  const dt=Math.min(clock.getDelta(),0.05);
  if(racing&&!finished&&!cdActive){
    raceStartTimer+=dt;
    updatePlayer(dt);
    SFX.updateEngine(player.spd);
    bots.forEach(b=>updateBot(b,dt));
    if(raceStartTimer>1.5)resolveCollisions();
    updateProjs(dt);
    updateShockwaves(dt);
    updateEggs(dt);
    updateTrackHazards(dt);
    updateHUD(dt);
  }
  updateCam();
  drawMinimap();
  renderer.render(scene,camera);
  const nextCp=(player.cp+1)%NCP;
  const distToNext=Math.hypot(player.pos.x-trackPts[nextCp].x,player.pos.z-trackPts[nextCp].z);
  document.getElementById('dbg').textContent=
    'lap='+player.lap+' cp='+player.cp+'/'+NCP+' nextDist='+distToNext.toFixed(1)+' totalCPs='+player.totalCPs;
}
