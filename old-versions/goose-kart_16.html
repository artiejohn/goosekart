</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const CHARS = [
  {id:'honker',name:'Sir Honks-a-Lot',emoji:'🪿',color:0xF5F0DC,accent:0xFFA500,
   ability:'MEGA HONK',desc:'Stun nearby racers',spd:1.0,hdl:1.0,cd:8000},
  {id:'grey',name:'Grey Feather',emoji:'🦢',color:0xBBBBBB,accent:0x7DF9FF,
   ability:'ICE GLIDE',desc:'Speed on ice/snow',spd:1.15,hdl:0.85,cd:6000},
  {id:'canada',name:'Goose Trudeau',emoji:'🦆',color:0x2a2a2a,accent:0xFFFFFF,
   ability:'FEATHER BLAST',desc:'Shoot feathers forward',spd:0.95,hdl:1.1,cd:5000},
  {id:'golden',name:'Golden Goose',emoji:'⭐',color:0xFFCC00,accent:0xFF8800,
   ability:'GOLDEN SPRINT',desc:'Massive speed burst',spd:1.0,hdl:1.0,cd:10000},
];

const TRACKS = [
  {id:'snow',name:'Frosty Peaks',emoji:'❄️',
   sky:0x8BBFD4, ground:0xDDEEFF, road:0xBBCCDD, wall:0x7799AA,
   fog:0xAAD0E8, fogD:0.012, ambient:0x99BBCC, sun:0xCCDDFF},
  {id:'forest',name:'Fern Forest',emoji:'🌲',
   sky:0x0a1a0a, ground:0x1a3a10, road:0x111111, wall:0x2a4a15,
   fog:0x0a1a0a, fogD:0.018, ambient:0x223322, sun:0x99BB77},
  {id:'grass',name:'Meadow Mile',emoji:'🌿',
   sky:0x5BB8FF, ground:0x4a9a2a, road:0x444433, wall:0x2a6a10,
   fog:0x99DDFF, fogD:0.008, ambient:0x88BBFF, sun:0xFFFFCC},
];

// ── GAME STATE ─────────────────────────────────────────────────────────────
let scene,camera,renderer,clock;
let player,bots=[],projs=[];
let keys={},racing=false,finished=false,cdActive=false;
let raceTime=0;
let abReady=true,abCd=0,selChar,selTrack;
let trackPts=[];
const NLAPS=3;
let NCP=200; // will be set after spline generation
let mmCtx;

// ── CATMULL-ROM SPLINE ────────────────────────────────────────────────────
function catmullRom(p0,p1,p2,p3,t){
  const t2=t*t, t3=t2*t;
  return {
    x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    z: 0.5*((2*p1.z)+(-p0.z+p2.z)*t+(2*p0.z-5*p1.z+4*p2.z-p3.z)*t2+(-p0.z+3*p1.z-3*p2.z+p3.z)*t3),
  };
}

// ── TRACK PATH ─────────────────────────────────────────────────────────────
function makeTrackPts(){
  // Unique closed-loop control points (NO duplicate first/last)
  // Last segment of the old track (the S-bend) has been smoothed into
  // a gentle sweep back to the start instead of a sharp zigzag.
  const ctrl = [
    [ 80,  0],   // 0  start/finish
    [ 92, 26],   // 1
    [ 96, 54],   // 2
    [ 84, 76],   // 3
    [ 58, 92],   // 4
    [ 26, 98],   // 5
    [  0, 93],   // 6  top
    [-26, 98],   // 7
    [-58, 92],   // 8
    [-84, 74],   // 9
    [-96, 44],   // 10
    [-96,  8],   // 11
    [-88,-24],   // 12
    [-74,-54],   // 13
    [-54,-80],   // 14
    [-22,-95],   // 15 bottom hairpin
    [ 14,-92],   // 16
    [ 44,-80],   // 17
    [ 66,-55],   // 18 — was sharp kink, now gentler
    [ 76,-28],   // 19 — smooth arc back toward start
  ];
  const N=ctrl.length; // true number of unique points
  const STEPS=10;
  const pts=[];
  for(let i=0;i<N;i++){
    const p0=ctrl[(i-1+N)%N];
    const p1=ctrl[i];
    const p2=ctrl[(i+1)%N];
    const p3=ctrl[(i+2)%N];
    for(let s=0;s<STEPS;s++){
      const t=s/STEPS;
      const r=catmullRom(
        {x:p0[0],z:p0[1]},
        {x:p1[0],z:p1[1]},
        {x:p2[0],z:p2[1]},
        {x:p3[0],z:p3[1]},
        t
      );
      pts.push(new THREE.Vector3(r.x,0,r.z));
    }
  }
  NCP=pts.length;
  return pts;
}

// ── SCENE ──────────────────────────────────────────────────────────────────
function initScene(){
  const tk=selTrack;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(tk.sky);
  scene.fog=new THREE.FogExp2(tk.fog,tk.fogD);

  // Perspective camera, top-down angle
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,900);
  camera.position.set(0,70,30);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;

  clock=new THREE.Clock();

  // Lights
  scene.add(new THREE.AmbientLight(tk.ambient,1.3));
  const sun=new THREE.DirectionalLight(tk.sun,1.8);
  sun.position.set(40,80,20);
  sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  scene.add(sun);

  // Ground
  const gm=new THREE.Mesh(
    new THREE.PlaneGeometry(600,600),
    new THREE.MeshLambertMaterial({color:tk.ground})
  );
  gm.rotation.x=-Math.PI/2;
  gm.receiveShadow=true;
  scene.add(gm);

  trackPts=makeTrackPts();
  buildRoad(tk);
  buildDecos(tk);
  spawnKarts();
  mmCtx=document.getElementById('minimap').getContext('2d');
}

// ── ROAD ──────────────────────────────────────────────────────────────────
function buildRoad(tk){
  const pts=trackPts, N=pts.length;
  const W=13;
  const KERB=1.8;

  function getRN(i){
    const c=pts[i%N], nx=pts[(i+1)%N];
    const d=new THREE.Vector3().subVectors(nx,c).normalize();
    return new THREE.Vector3(-d.z,0,d.x);
  }
  function getDir(i){
    const c=pts[i%N], nx=pts[(i+1)%N];
    return new THREE.Vector3().subVectors(nx,c).normalize();
  }

  // Helper: build a flat ribbon as merged BufferGeometry
  function buildRibbon(offsetFn, yVal){
    const verts=[], idxs=[];
    for(let i=0;i<=N;i++){
      const c=pts[i%N];
      const r=getRN(i);
      const [lx,lz,rx2,rz2]=offsetFn(c,r);
      verts.push(rx2, yVal, rz2);  // right
      verts.push(lx,  yVal, lz);   // left
      if(i<N){ const b=i*2; idxs.push(b,b+2,b+1, b+1,b+2,b+3); }
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
    g.setIndex(idxs);
    g.computeVertexNormals();
    return g;
  }

  // 1. ASPHALT
  const asphaltCol=tk.id==='snow'?0x445566:tk.id==='forest'?0x222222:0x333322;
  const roadGeo=buildRibbon((c,r)=>[c.x-r.x*W,c.z-r.z*W, c.x+r.x*W,c.z+r.z*W],0.04);
  scene.add(new THREE.Mesh(roadGeo,new THREE.MeshLambertMaterial({color:asphaltCol})));

  // 2. KERBS — two merged ribbons (inner/outer edge), alternating red/white via vertex colors
  // Use two separate ribbons: red kerb and white kerb interleaved by segment
  const kerbVertsR=[], kerbIdxR=[], kerbVertsW=[], kerbIdxW=[];
  let ri=0,wi=0;
  for(let i=0;i<N;i++){
    const c=pts[i%N], cn=pts[(i+1)%N], r=getRN(i), rn=getRN(i+1);
    const verts= i%2===0 ? kerbVertsR : kerbVertsW;
    const idxs = i%2===0 ? kerbIdxR   : kerbIdxW;
    const base = i%2===0 ? ri : wi;
    // left kerb strip
    for(const [cv,rv] of [[c,r],[cn,rn]]){
      verts.push(cv.x-rv.x*W,      0.09, cv.z-rv.z*W);
      verts.push(cv.x-rv.x*(W+KERB),0.09,cv.z-rv.z*(W+KERB));
    }
    // right kerb strip
    for(const [cv,rv] of [[c,r],[cn,rn]]){
      verts.push(cv.x+rv.x*W,      0.09, cv.z+rv.z*W);
      verts.push(cv.x+rv.x*(W+KERB),0.09,cv.z+rv.z*(W+KERB));
    }
    const b=base;
    idxs.push(b,b+2,b+1, b+1,b+2,b+3);         // left
    idxs.push(b+4,b+6,b+5, b+5,b+6,b+7);       // right
    if(i%2===0) ri+=8; else wi+=8;
  }
  for(const [verts,idxs,col] of [[kerbVertsR,kerbIdxR,0xDD2222],[kerbVertsW,kerbIdxW,0xEEEEEE]]){
    if(verts.length===0) continue;
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
    g.setIndex(idxs); g.computeVertexNormals();
    scene.add(new THREE.Mesh(g,new THREE.MeshLambertMaterial({color:col})));
  }

  // 3. WHITE EDGE LINES — single merged ribbon just inside road edge
  const lineGeoL=buildRibbon((c,r)=>[c.x-r.x*(W-0.6),c.z-r.z*(W-0.6), c.x-r.x*(W-0.05),c.z-r.z*(W-0.05)],0.08);
  const lineGeoR=buildRibbon((c,r)=>[c.x+r.x*(W-0.05),c.z+r.z*(W-0.05), c.x+r.x*(W-0.6),c.z+r.z*(W-0.6)],0.08);
  const lineMat=new THREE.MeshBasicMaterial({color:0xFFFFFF});
  scene.add(new THREE.Mesh(lineGeoL,lineMat));
  scene.add(new THREE.Mesh(lineGeoR,lineMat));

  // 4. CENTRE DASHES — every 5th segment only, merged
  const dashVerts=[], dashIdxs=[];
  let di=0;
  for(let i=0;i<N;i+=5){
    const c=pts[i], cn=pts[(i+2)%N], r=getRN(i), rn=getRN(i+2);
    dashVerts.push(c.x-r.x*0.3,0.08,c.z-r.z*0.3, c.x+r.x*0.3,0.08,c.z+r.z*0.3,
                   cn.x-rn.x*0.3,0.08,cn.z-rn.z*0.3, cn.x+rn.x*0.3,0.08,cn.z+rn.z*0.3);
    dashIdxs.push(di,di+2,di+1, di+1,di+2,di+3);
    di+=4;
  }
  const dashG=new THREE.BufferGeometry();
  dashG.setAttribute('position',new THREE.Float32BufferAttribute(dashVerts,3));
  dashG.setIndex(dashIdxs); dashG.computeVertexNormals();
  scene.add(new THREE.Mesh(dashG,new THREE.MeshBasicMaterial({color:0xFFFFAA})));

  // 5. START/FINISH LINE + GANTRY
  const s0=pts[0];
  const sd=getDir(0);
  const rn0=new THREE.Vector3(-sd.z,0,sd.x);
  const angle0=Math.atan2(sd.x,sd.z);

  // Chequered line (single merged mesh)
  const sqW=(W*2)/8, sqD=2.5;
  const sfVerts=[], sfIdxs=[], sfColors=[];
  let si=0;
  for(let col=0;col<8;col++){
    const off=(col-3.5)*sqW + sqW/2;
    const isW=col%2===0;
    const cx=s0.x+rn0.x*off, cz=s0.z+rn0.z*off;
    const c=isW?[1,1,1]:[0.05,0.05,0.05];
    for(const fwd of[-sqD/2,sqD/2]){
      sfVerts.push(cx-rn0.x*sqW/2, 0.09, cz-rn0.z*sqW/2+sd.z*fwd,
                   cx+rn0.x*sqW/2, 0.09, cz+rn0.z*sqW/2+sd.z*fwd);
      sfColors.push(...c,...c);
    }
    sfIdxs.push(si,si+2,si+1, si+1,si+2,si+3); si+=4;
  }
  const sfG=new THREE.BufferGeometry();
  sfG.setAttribute('position',new THREE.Float32BufferAttribute(sfVerts,3));
  sfG.setAttribute('color',new THREE.Float32BufferAttribute(sfColors,3));
  sfG.setIndex(sfIdxs); sfG.computeVertexNormals();
  scene.add(new THREE.Mesh(sfG,new THREE.MeshBasicMaterial({vertexColors:true})));

  // Gantry — just 3 boxes + 2 poles, very cheap
  const poleMat=new THREE.MeshLambertMaterial({color:0xCCCCCC});
  const gW=W*2+6;
  for(const s of[-1,1]){
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,10,8),poleMat);
    pole.position.set(s0.x+rn0.x*(gW/2)*s, 5, s0.z+rn0.z*(gW/2)*s);
    scene.add(pole);
  }
  const bar=new THREE.Mesh(new THREE.BoxGeometry(gW,1,1),poleMat);
  bar.position.set(s0.x,10,s0.z); bar.rotation.y=angle0; scene.add(bar);
  // Chequered sign on bar
  const signG=new THREE.Mesh(new THREE.BoxGeometry(gW*0.6,2,0.2),
    new THREE.MeshBasicMaterial({color:0x111111}));
  signG.position.set(s0.x,8.5,s0.z); signG.rotation.y=angle0; scene.add(signG);
  // Red lights
  for(const s of[-1,1]){
    const l=new THREE.Mesh(new THREE.SphereGeometry(0.4,6,4),
      new THREE.MeshBasicMaterial({color:0xFF2200}));
    l.position.set(s0.x+rn0.x*(gW/2-1)*s,10.5,s0.z+rn0.z*(gW/2-1)*s);
    scene.add(l);
  }

  // 6. BOLLARDS — only every 10th point, just a simple cone each, shared material
  const bollardMatR=new THREE.MeshLambertMaterial({color:0xFF4400});
  const bollardMatW=new THREE.MeshLambertMaterial({color:0xFFFFFF});
  for(let i=0;i<N;i+=10){
    const c=pts[i], r=getRN(i);
    for(const s of[-1,1]){
      const mat=i%20===0?bollardMatR:bollardMatW;
      const cone=new THREE.Mesh(new THREE.CylinderGeometry(0,0.5,2,6),mat);
      cone.position.set(c.x+r.x*(W+KERB+3)*s, 1, c.z+r.z*(W+KERB+3)*s);
      scene.add(cone);
    }
  }
}

// ── DECORATIONS ──────────────────────────────────────────────────────────
function buildDecos(tk){
  // Shared materials
  const mats={
    snowTree: new THREE.MeshLambertMaterial({color:0xDDEEFF}),
    snowTrunk:new THREE.MeshLambertMaterial({color:0x887766}),
    forestTree:new THREE.MeshLambertMaterial({color:0x113311}),
    forestTrunk:new THREE.MeshLambertMaterial({color:0x4a2a10}),
    bush1:new THREE.MeshLambertMaterial({color:0x33AA33}),
    bush2:new THREE.MeshLambertMaterial({color:0xFFFF44}),
  };
  const coneGeo=new THREE.ConeGeometry(1.5,6,7);
  const trunkGeo=new THREE.CylinderGeometry(0.25,0.35,1.5,6);
  const bushGeo=new THREE.SphereGeometry(0.9,6,4);

  for(let i=0;i<30;i++){
    let x,z,tries=0;
    do{
      x=(Math.random()-.5)*380; z=(Math.random()-.5)*340; tries++;
    }while(tries<15 && trackPts.some(p=>Math.hypot(x-p.x,z-p.z)<22));

    if(tk.id==='snow'){
      const trunk=new THREE.Mesh(trunkGeo,mats.snowTrunk);
      trunk.position.set(x,0.75,z); scene.add(trunk);
      const tree=new THREE.Mesh(coneGeo,mats.snowTree);
      tree.position.set(x,4.5,z); scene.add(tree);
    } else if(tk.id==='forest'){
      const trunk=new THREE.Mesh(trunkGeo,mats.forestTrunk);
      trunk.position.set(x,0.75,z); scene.add(trunk);
      const tree=new THREE.Mesh(coneGeo,mats.forestTree);
      tree.position.set(x,5,z); scene.add(tree);
    } else {
      const mat=Math.random()<0.5?mats.bush1:mats.bush2;
      const b=new THREE.Mesh(bushGeo,mat);
      b.position.set(x,0.9,z); scene.add(b);
    }
  }
}

// ── KART MESH ─────────────────────────────────────────────────────────────
function makeKart(col,acc){
  const g=new THREE.Group();
  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.8,1,4),
    new THREE.MeshLambertMaterial({color:col}));
  body.position.y=.7; body.castShadow=true; g.add(body);
  // Nose accent
  const nose=new THREE.Mesh(new THREE.BoxGeometry(2,0.7,1.3),
    new THREE.MeshLambertMaterial({color:acc}));
  nose.position.set(0,.55,2.4); g.add(nose);
  // Goose body
  const gb=new THREE.Mesh(new THREE.SphereGeometry(.75,9,7),
    new THREE.MeshLambertMaterial({color:0xF5F0DC}));
  gb.scale.y=1.25; gb.position.set(0,2,0.2); g.add(gb);
  // Head
  const gh=new THREE.Mesh(new THREE.SphereGeometry(.42,8,6),
    new THREE.MeshLambertMaterial({color:0xF5F0DC}));
  gh.position.set(0,2.9,0.85); g.add(gh);
  // Beak
  const bk=new THREE.Mesh(new THREE.ConeGeometry(.14,.5,5),
    new THREE.MeshLambertMaterial({color:0xFF9900}));
  bk.rotation.x=Math.PI/2; bk.position.set(0,2.8,1.4); g.add(bk);
  // Eyes
  for(const sx of[-.25,.25]){
    const ey=new THREE.Mesh(new THREE.SphereGeometry(.07,5,5),
      new THREE.MeshBasicMaterial({color:0x111111}));
    ey.position.set(sx,3.05,1.2); g.add(ey);
  }
  // Wheels
  for(const [wx,wz] of[[-1.55,1.35],[1.55,1.35],[-1.55,-1.35],[1.55,-1.35]]){
    const wh=new THREE.Mesh(new THREE.CylinderGeometry(.55,.55,.45,10),
      new THREE.MeshLambertMaterial({color:0x222222}));
    wh.rotation.z=Math.PI/2; wh.position.set(wx,.45,wz); g.add(wh);
  }
  return g;
}

// ── KART SPAWN ────────────────────────────────────────────────────────────
function spawnKarts(){
  const ch=selChar;

  // Compute the forward direction at the start (pt[0] → pt[1])
  const p0=trackPts[0], p1=trackPts[1];
  const fwd=new THREE.Vector3().subVectors(p1,p0).normalize();
  const startAngle=Math.atan2(-fwd.x,-fwd.z); // angle kart faces forward
  const right=new THREE.Vector3(-fwd.z,0,fwd.x); // perpendicular right

  // Grid: col ±1 = left/right lanes (7 units apart), row = staggered 10 units back
  const grid=[
    {col: 1, row:0},  // front-right  → player
    {col:-1, row:0},  // front-left   → bot 1
    {col: 1, row:1},  // back-right   → bot 2
    {col:-1, row:1},  // back-left    → bot 3
  ];

  function gridPos(slot){
    const g=grid[slot];
    return new THREE.Vector3(
      p0.x + right.x*g.col*7 - fwd.x*(g.row*10+6),
      0,
      p0.z + right.z*g.col*7 - fwd.z*(g.row*10+6)
    );
  }

  player={
    mesh:makeKart(ch.color,ch.accent),
    pos:gridPos(0),
    angle:startAngle, spd:0,
    cp:0, lap:1, cpTotal:0, totalCPs:0, done:false,
    abReady:true, abCd:0,
  };
  player.mesh.position.copy(player.pos);
  player.mesh.rotation.y=startAngle;
  scene.add(player.mesh);

  const others=CHARS.filter(c=>c.id!==ch.id);
  others.slice(0,3).forEach((bc,i)=>{
    const bot={
      mesh:makeKart(bc.color,bc.accent),
      pos:gridPos(i+1),
      angle:startAngle, spd:0,
      cp:0, lap:1, cpTotal:0, totalCPs:0, done:false,
      stunned:0, boost:0,
      char:bc,
      aiTgt:5,
      aiWander:0,
      abReady:true, abCd:0,
    };
    bot.mesh.position.copy(bot.pos);
    bot.mesh.rotation.y=startAngle;
    scene.add(bot.mesh);
    bots.push(bot);
  });
}

// ── PHYSICS ───────────────────────────────────────────────────────────────
const MAXSPD=.65, ACC=.022, BRK=.038, FRIC=.014, TURN=.038;

function updatePlayer(dt){
  const k=player;
  if(!racing||finished||cdActive) return;

  const ms=k.boost>0?MAXSPD*k.char.spd*1.7:MAXSPD*k.char.spd;
  if(k.stunned>0){ k.stunned-=dt*1000; k.spd*=.9; }
  else {
    if(k.boost>0) k.boost-=dt*1000;
    if(keys['KeyW']||keys['ArrowUp'])   k.spd=Math.min(k.spd+ACC,ms);
    else if(keys['KeyS']||keys['ArrowDown']) k.spd=Math.max(k.spd-BRK,-ms*.35);
    else { k.spd*=(1-FRIC); if(Math.abs(k.spd)<.001) k.spd=0; }
    const tr=TURN*k.char.hdl*Math.min(Math.abs(k.spd)/MAXSPD+.3,1);
    if(keys['KeyA']||keys['ArrowLeft'])  k.angle+=tr;
    if(keys['KeyD']||keys['ArrowRight']) k.angle-=tr;
  }

  k.pos.x-=Math.sin(k.angle)*k.spd;
  k.pos.z-=Math.cos(k.angle)*k.spd;
  k.mesh.position.copy(k.pos);
  k.mesh.position.y=0;
  k.mesh.rotation.y=k.angle;
  tickAbilityCooldown(k, dt);
  checkCP(k,true);
}

function updateBot(b,dt){
  const tgt=trackPts[b.aiTgt];
  const dx=tgt.x-b.pos.x, dz=tgt.z-b.pos.z;
  if(Math.sqrt(dx*dx+dz*dz)<7){
    b.aiTgt=(b.aiTgt+5)%NCP;
    if(Math.random()<.3) b.aiWander=(Math.random()-.5)*.4;
  }
  const ta=Math.atan2(-dx,-dz)+b.aiWander;
  let da=ta-b.angle;
  while(da>Math.PI) da-=Math.PI*2;
  while(da<-Math.PI) da+=Math.PI*2;
  b.angle+=Math.sign(da)*Math.min(Math.abs(da),TURN*b.char.hdl);

  if(b.stunned>0){ b.stunned-=dt*1000; b.spd*=.88; }
  else b.spd=Math.min(b.spd+ACC*.75,MAXSPD*b.char.spd*.88);

  b.pos.x-=Math.sin(b.angle)*b.spd;
  b.pos.z-=Math.cos(b.angle)*b.spd;
  b.mesh.position.copy(b.pos);
  b.mesh.position.y=0;
  b.mesh.rotation.y=b.angle;
  botAbilityAI(b, dt);
  checkCP(b,false);
}

// ── KART COLLISION ────────────────────────────────────────────────────────
// (handled by resolveCollisions() below near the game loop)

function checkCP(k,isPlayer){
  const next=(k.cp+1)%NCP;
  if(Math.hypot(k.pos.x-trackPts[next].x,k.pos.z-trackPts[next].z)<8){
    const prevCp=k.cp;
    k.cp=next;
    k.totalCPs++;          // always increases, used for position ranking

    // Completed a lap: wrapped back to cp 0 from the end
    if(prevCp===NCP-1 && k.cp===0){
      k.lap++;
      if(isPlayer){
        if(k.lap>NLAPS){ endRace(); return; }
        floatText(`🏁 LAP ${k.lap}!`,'#FFD700');
      }
    }
  }
}

// ── POSITION ──────────────────────────────────────────────────────────────
function getPos(){
  const ps=player.totalCPs;
  let pos=1;
  for(const b of bots){ if(b.totalCPs>ps) pos++; }
  return pos;
}
function updateProjs(dt){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    p.life-=dt*1000;
    p.pos.x+=p.dirX*1.1;
    p.pos.z+=p.dirZ*1.1;
    p.mesh.position.copy(p.pos);
    p.mesh.rotation.y+=.25;
    let hit=false;
    for(const v of p.victims){
      if(Math.hypot(p.pos.x-v.pos.x,p.pos.z-v.pos.z)<3.5){
        v.stunned=2200;
        hit=true; break;
      }
    }
    if(hit||p.life<=0){ scene.remove(p.mesh); projs.splice(i,1); }
  }
}

// ── SHOCKWAVE POOL ────────────────────────────────────────────────────────
const shockwaves=[];

function spawnShockwave(pos, col){
  const geo=new THREE.RingGeometry(0.5, 1.5, 32);
  const mat=new THREE.MeshBasicMaterial({color:col, side:THREE.DoubleSide, transparent:true, opacity:0.9});
  const mesh=new THREE.Mesh(geo, mat);
  mesh.rotation.x=-Math.PI/2;
  mesh.position.set(pos.x, 0.3, pos.z);
  scene.add(mesh);
  shockwaves.push({mesh, radius:1.5, maxRadius:28, speed:38, mat});
}

function updateShockwaves(dt){
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];
    sw.radius+=sw.speed*dt;
    const t=sw.radius/sw.maxRadius;
    sw.mat.opacity=0.85*(1-t);
    const s=sw.radius/1.5;
    sw.mesh.scale.set(s,s,s);

    // Check if shockwave ring has reached any victim
    if(sw.victims && sw.triggered){
      for(const v of sw.victims){
        if(!sw.triggered.has(v)){
          const d=Math.hypot(v.pos.x-sw.origin.x, v.pos.z-sw.origin.z);
          if(d<=sw.radius && d>=sw.radius-sw.speed*dt*2){
            v.stunned=2000;
            sw.triggered.add(v);
          }
        }
      }
    }

    if(sw.radius>=sw.maxRadius){
      scene.remove(sw.mesh);
      sw.mat.dispose();
      shockwaves.splice(i,1);
    }
  }
}

// ── ABILITIES ─────────────────────────────────────────────────────────────
// Generic ability executor — works for player and bots alike
function useAbility(kart, victims){
  if(!kart.abReady) return;
  kart.abReady=false;
  kart.abCd=kart.char.cd;
  const id=kart.char.id;
  const isPlayer=(kart===player);

  if(id==='honker'){
    // MEGA HONK — expanding shockwave stuns anyone it reaches
    spawnShockwave(kart.pos, 0xFFDD00);
    // Stun logic handled by shockwave growth — we tag it with origin and victims
    const sw=shockwaves[shockwaves.length-1];
    sw.origin=kart.pos.clone();
    sw.victims=victims;
    sw.triggered=new Set();
    if(isPlayer){ flashScreen('#FFD700',.45); floatText('💛 MEGA HONK!','#FFD700'); }
    else { floatText3D('💛 HONK!', kart.pos); }
  } else if(id==='grey'){
    kart.boost=3000;
    if(isPlayer){ flashScreen('#7DF9FF',.3); floatText('❄️ ICE GLIDE!','#7DF9FF'); }
    else { floatText3D('❄️', kart.pos); }
  } else if(id==='canada'){
    // Feather blast — shoot projectile in kart's forward direction
    const pm={
      mesh:new THREE.Mesh(
        new THREE.SphereGeometry(.55,6,4),
        new THREE.MeshBasicMaterial({color:0xFFFFFF})
      ),
      pos:kart.pos.clone(),
      dirX:-Math.sin(kart.angle),
      dirZ:-Math.cos(kart.angle),
      life:3000,
      owner:kart,
      victims,
    };
    scene.add(pm.mesh);
    projs.push(pm);
    if(isPlayer){ flashScreen('#FFFFFF',.25); floatText('🪶 FEATHERS!','#fff'); }
    else { floatText3D('🪶', kart.pos); }
  } else { // golden
    kart.boost=4500;
    if(isPlayer){ flashScreen('#FFD700',.55); floatText('⭐ GOLDEN SPRINT!','#FFD700'); }
    else { floatText3D('⭐', kart.pos); }
  }
}

// Cooldown ticker for any kart
function tickAbilityCooldown(kart, dt){
  if(!kart.abReady){
    kart.abCd=Math.max(0, kart.abCd-dt*1000);
    if(kart.abCd<=0) kart.abReady=true;
  }
}

// 3D floating emoji above a world position (for bots)
function floatText3D(txt, worldPos){
  if(!camera) return;
  // Project 3D pos to screen
  const v=new THREE.Vector3(worldPos.x, 4, worldPos.z);
  v.project(camera);
  const x=(v.x*.5+.5)*window.innerWidth;
  const y=(-.5*v.y+.5)*window.innerHeight;
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;left:${x}px;top:${y}px;transform:translate(-50%,-50%);
    font-size:30px;pointer-events:none;z-index:80;animation:ft 1s ease forwards;`;
  d.textContent=txt;
  if(!document.getElementById('ftStyle')){
    const s=document.createElement('style');
    s.id='ftStyle';
    s.textContent='@keyframes ft{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-130%) scale(1.1);opacity:0}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

function fireAbility(){
  if(!racing||finished||cdActive||!player.abReady) return;
  useAbility(player, bots);
  // Update player HUD cooldown bar
  abReady=player.abReady; abCd=player.abCd;
}

function flashScreen(col,op){
  const el=document.getElementById('flash');
  el.style.background=col; el.style.opacity=op;
  setTimeout(()=>el.style.opacity=0,280);
}

function floatText(txt,col){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
    font-size:46px;font-weight:900;color:${col};text-shadow:3px 3px 0 #000;
    pointer-events:none;z-index:80;animation:ft 1s ease forwards;`;
  d.textContent=txt;
  if(!document.getElementById('ftStyle')){
    const s=document.createElement('style');
    s.id='ftStyle';
    s.textContent='@keyframes ft{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-80%) scale(1.2);opacity:0}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

// Bot ability AI — fire when ready and a victim is nearby
function botAbilityAI(bot, dt){
  tickAbilityCooldown(bot, dt);
  if(!bot.abReady) return;
  if(raceStartTimer<3) return; // don't fire during race start scramble
  const others=[player,...bots.filter(b=>b!==bot)];
  const nearby=others.some(k=>Math.hypot(bot.pos.x-k.pos.x,bot.pos.z-k.pos.z)<20);
  const alwaysFire=['grey','golden'].includes(bot.char.id);
  if(nearby || (alwaysFire && Math.random()<0.008)){
    useAbility(bot, others);
  }
}

// ── MINIMAP ───────────────────────────────────────────────────────────────
function drawMinimap(){
  const c=mmCtx,W=110,H=110,sc=0.50;
  c.clearRect(0,0,W,H);
  c.fillStyle='rgba(0,0,0,.72)'; c.fillRect(0,0,W,H);
  // track outline
  c.strokeStyle='#888'; c.lineWidth=5;
  c.beginPath();
  trackPts.forEach((p,i)=>{
    const x=W/2+p.x*sc, y=H/2+p.z*sc;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  });
  c.closePath(); c.stroke();
  // bots
  c.fillStyle='#FF5555';
  for(const b of bots){
    c.beginPath(); c.arc(W/2+b.pos.x*sc,H/2+b.pos.z*sc,3.5,0,Math.PI*2); c.fill();
  }
  // player
  c.fillStyle='#FFD700';
  c.beginPath(); c.arc(W/2+player.pos.x*sc,H/2+player.pos.z*sc,5,0,Math.PI*2); c.fill();
}

// ── CAMERA ────────────────────────────────────────────────────────────────
function updateCam(){
  if(!player||!camera) return;
  const ox=Math.sin(player.angle)*22;
  const oz=Math.cos(player.angle)*22;
  camera.position.set(player.pos.x+ox, 28, player.pos.z+oz);
  const lx=player.pos.x - Math.sin(player.angle)*8;
  const lz=player.pos.z - Math.cos(player.angle)*8;
  camera.lookAt(lx, 0, lz);
}

// ── HUD UPDATE ────────────────────────────────────────────────────────────
function updateHUD(dt){
  raceTime+=dt;
  const displayLap=Math.min(player.lap, NLAPS);
  document.getElementById('lapd').textContent=`LAP ${displayLap}/${NLAPS}`;
  document.getElementById('posd').textContent=`POS ${getPos()}/4`;
  document.getElementById('spdd').textContent=`${Math.round(Math.abs(player.spd)*200)} km/h`;
  if(!player.abReady){
    document.getElementById('abfill').style.width=((1-player.abCd/selChar.cd)*100)+'%';
  } else {
    document.getElementById('abfill').style.width='100%';
  }
}

// ── FINISH ────────────────────────────────────────────────────────────────
function endRace(){
  if(finished) return;
  finished=true; player.done=true;
  const pos=getPos();
  const m=Math.floor(raceTime/60), s=(raceTime%60).toFixed(2);
  const labels=['🥇 1ST PLACE!','🥈 2ND PLACE','🥉 3RD PLACE','4TH PLACE'];
  document.getElementById('fintitle').textContent=pos===1?'🏆 WINNER! HONK HONK!':'🏁 RACE OVER!';
  document.getElementById('finpos').textContent=labels[pos-1]||`${pos}TH`;
  document.getElementById('fintm').textContent=`Time: ${m}:${s.padStart(5,'0')}`;
  document.getElementById('fin').style.display='flex';
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────
function startCD(){
  cdActive=true;
  const el=document.getElementById('cdtxt');
  const seq=['3','2','1','HONK! 🪿'];
  let i=0;
  el.style.display='flex';
  function tick(){

    if(i<seq.length) setTimeout(tick,900);
    else setTimeout(()=>{ el.style.display='none'; cdActive=false; racing=true; },750);
  }
  tick();
}

// ── COLLISION ─────────────────────────────────────────────────────────────
const KART_RADIUS = 2.6; // circle hitbox radius per kart

function resolveCollisions(){
  const allKarts = [player, ...bots];
  const diam = KART_RADIUS * 2;

  for(let i=0;i<allKarts.length;i++){
    for(let j=i+1;j<allKarts.length;j++){
      const a=allKarts[i], b=allKarts[j];
      const dx=b.pos.x-a.pos.x;
      const dz=b.pos.z-a.pos.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<diam && dist>0.001){
        // Normalised collision axis
        const nx=dx/dist, nz=dz/dist;
        // Overlap penetration
        const overlap=(diam-dist)*0.55;
        // Push apart equally
        a.pos.x-=nx*overlap*0.5;
        a.pos.z-=nz*overlap*0.5;
        b.pos.x+=nx*overlap*0.5;
        b.pos.z+=nz*overlap*0.5;

        // Velocity component along collision axis
        const aVel = -(Math.sin(a.angle)*a.spd);  // x component
        const aVelZ= -(Math.cos(a.angle)*a.spd);  // z component
        const bVel = -(Math.sin(b.angle)*b.spd);
        const bVelZ= -(Math.cos(b.angle)*b.spd);

        const aAlong = aVel*nx + aVelZ*nz; // dot product along collision normal
        const bAlong = bVel*nx + bVelZ*nz;

        // Only resolve if approaching
        if(aAlong - bAlong > 0){
          // Elastic-ish exchange with some energy loss
          const restitution = 0.55;
          const impulse = (aAlong - bAlong) * restitution;

          // Translate impulse back into speed change for each kart
          // Project impulse onto each kart's forward direction
          const aFwdX=-Math.sin(a.angle), aFwdZ=-Math.cos(a.angle);
          const bFwdX=-Math.sin(b.angle), bFwdZ=-Math.cos(b.angle);

          const aImpulseProj = (nx*aFwdX + nz*aFwdZ) * impulse;
          const bImpulseProj = (nx*bFwdX + nz*bFwdZ) * impulse;

          a.spd -= aImpulseProj * 0.6;
          b.spd += bImpulseProj * 0.6;

          // Clamp speeds
          const aMax=MAXSPD*a.char.spd*1.8;
          const bMax=MAXSPD*b.char.spd*1.8;
          a.spd=Math.max(-aMax*0.4, Math.min(aMax, a.spd));
          b.spd=Math.max(-bMax*0.4, Math.min(bMax, b.spd));

          // Apply a small lateral nudge so karts don't perfectly stack
          const lateralA = (Math.random()-0.5)*0.08;
          const lateralB = (Math.random()-0.5)*0.08;
          a.angle += lateralA;
          b.angle += lateralB;
        }

        // Update mesh positions immediately after push
        a.mesh.position.copy(a.pos);
        b.mesh.position.copy(b.pos);
      }
    }
  }
}


let raceStartTimer=0; // counts up after racing=true

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  try {
    if(racing&&!finished&&!cdActive){
      raceStartTimer+=dt;
      updatePlayer(dt);
      bots.forEach(b=>updateBot(b,dt));
      if(raceStartTimer>1.5) resolveCollisions();
      updateProjs(dt);
      updateShockwaves(dt);
      updateHUD(dt);
    }
    updateCam();
    drawMinimap();
    renderer.render(scene,camera);
    // Debug overlay
    const dbg=document.getElementById('dbg');
    if(dbg) dbg.textContent=`racing=${racing} finished=${finished} cdActive=${cdActive} spd=${player?player.spd.toFixed(3):'NO_PLAYER'} W=${keys['KeyW']} timer=${raceStartTimer.toFixed(1)}`;
  } catch(e){ console.error('Loop error:',e); const dbg=document.getElementById('dbg'); if(dbg) dbg.textContent='ERROR: '+e.message; }
}

    document.getElementById('hud').style.display='flex';
    document.getElementById('trkind').style.display='block';
    document.getElementById('trkind').textContent=`${selTrack.emoji} ${selTrack.name.toUpperCase()}`;
    document.getElementById('abbar').style.display='flex';
    document.getElementById('abicon').textContent=selChar.emoji;
    document.getElementById('ablbl').innerHTML=selChar.ability+'<br><span style="color:#aaa;font-size:11px">SPACE</span>';
    document.getElementById('minimap').style.display='block';
    initScene();
    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
    loop();
    startCD();
  };
})();

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){ e.preventDefault(); fireAbility(); }
});
window.addEventListener('keyup',e=>keys[e.code]=false);
</script>
</body>
</html>
