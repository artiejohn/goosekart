<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HONK KART</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Arial Black',sans-serif; }
#c { display:block; width:100vw; height:100vh; }

#hud { position:fixed; top:12px; left:50%; transform:translateX(-50%);
  display:none; gap:16px; align-items:center; }
.hb { background:rgba(0,0,0,.7); border:2px solid rgba(255,255,255,.25);
  border-radius:10px; padding:6px 16px; color:#fff; font-size:17px; }
#lapd { color:#FFD700; }
#posd { color:#7DF9FF; }
#spdd { color:#90EE90; }

#abbar { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  display:none; align-items:center; gap:10px; }
#abicon { width:58px; height:58px; background:rgba(0,0,0,.75);
  border:3px solid #FFD700; border-radius:12px; display:flex;
  align-items:center; justify-content:center; font-size:32px; }
#ablbl { color:#FFD700; font-size:14px; text-align:center; }
#abcdw { width:58px; height:5px; background:#333; border-radius:3px; margin-top:4px; overflow:hidden; }
#abfill { height:100%; background:#FFD700; width:100%; }

#trkind { position:fixed; top:12px; right:12px; display:none;
  background:rgba(0,0,0,.7); border:2px solid rgba(255,255,255,.2);
  border-radius:10px; padding:6px 14px; color:#fff; font-size:15px; }

#minimap { position:fixed; bottom:20px; right:12px; display:none;
  border:2px solid rgba(255,255,255,.2); border-radius:10px; }

#flash { position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity .3s; z-index:50; }
#cdtxt { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
  font-size:110px; color:#FFD700; text-shadow:0 0 40px rgba(255,215,0,.8);
  pointer-events:none; z-index:90; font-family:'Arial Black',sans-serif; }

/* MENU */
#menu { position:fixed; inset:0;
  background:linear-gradient(135deg,#0d1b2a,#1a3a20,#0d1b2a);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:24px; z-index:100; }
#menu h1 { font-size:68px; color:#FFD700;
  text-shadow:4px 4px 0 #996600, 0 0 40px rgba(255,215,0,.5);
  animation:bob 2s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.mlbl { color:#fff; font-size:18px; align-self:flex-start; margin-left:4px; }
.cgrid { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
.ccard { background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.15);
  border-radius:14px; padding:16px 20px; cursor:pointer; text-align:center;
  min-width:130px; transition:all .2s; }
.ccard:hover,.ccard.sel { background:rgba(255,215,0,.15); border-color:#FFD700;
  transform:translateY(-5px); box-shadow:0 10px 25px rgba(255,215,0,.3); }
.cemoji { font-size:44px; }
.cname { color:#FFD700; font-size:17px; margin-top:6px; }
.cabl { color:#aaa; font-size:12px; margin-top:3px; }
.tgrid { display:flex; gap:14px; }
.tcard { background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.15);
  border-radius:12px; padding:14px 20px; cursor:pointer; text-align:center;
  min-width:110px; transition:all .2s; }
.tcard:hover,.tcard.sel { border-color:#7DF9FF; background:rgba(125,249,255,.1);
  transform:translateY(-4px); }
.temoji { font-size:36px; }
.tname { color:#7DF9FF; font-size:16px; margin-top:5px; }
#sbtn { background:#FFD700; color:#000; border:none; border-radius:12px;
  font-size:26px; font-weight:900; padding:12px 44px; cursor:pointer;
  box-shadow:0 6px 20px rgba(255,215,0,.4); transition:all .2s; }
#sbtn:hover { transform:scale(1.05); box-shadow:0 10px 30px rgba(255,215,0,.6); }

/* FINISH */
#fin { position:fixed; inset:0; background:rgba(0,0,0,.85);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:18px; z-index:100; }
#fin h2 { font-size:58px; color:#FFD700; text-shadow:3px 3px 0 #996600; }
#finpos,#fintm { color:#fff; font-size:22px; }
#rbtn { background:#FFD700; color:#000; border:none; border-radius:12px;
  font-size:22px; font-weight:900; padding:10px 36px; cursor:pointer; margin-top:8px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" style="display:none; position:fixed; top:12px; left:50%; transform:translateX(-50%); display:none; gap:16px;">
  <div class="hb" id="lapd">LAP 1/3</div>
  <div class="hb" id="posd">POS 1/4</div>
  <div class="hb" id="spdd">0 km/h</div>
</div>
<div id="trkind"></div>
<div id="abbar">
  <div><div id="abicon">🪿</div><div id="abcdw"><div id="abfill"></div></div></div>
  <div id="ablbl">ABILITY<br><span style="color:#aaa;font-size:11px">SPACE</span></div>
</div>
<canvas id="minimap" width="110" height="110"></canvas>
<div id="flash"></div>
<div id="cdtxt"></div>

<div id="menu">
  <h1>🪿 HONK KART</h1>
  <div style="color:#aaffaa;font-size:22px;letter-spacing:2px;">GOOSE GRAND PRIX</div>
  <div class="mlbl">Choose Your Goose</div>
  <div class="cgrid" id="cgrid"></div>
  <div class="mlbl">Select Track</div>
  <div class="tgrid" id="tgrid"></div>
  <button id="sbtn">🪿 HONK TO START!</button>
  <div style="color:#666;font-size:13px;">WASD to drive · SPACE for ability</div>
</div>

<div id="fin">
  <h2 id="fintitle">🏁 RACE OVER!</h2>
  <div id="finpos"></div>
  <div id="fintm"></div>
  <button id="rbtn" onclick="location.reload()">RACE AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const CHARS = [
  {id:'honker',name:'Sir Honks-a-Lot',emoji:'🪿',color:0xF5F0DC,accent:0xFFA500,
   ability:'MEGA HONK',desc:'Stun nearby racers',spd:1.0,hdl:1.0,cd:8000},
  {id:'grey',name:'Grey Feather',emoji:'🦢',color:0xBBBBBB,accent:0x7DF9FF,
   ability:'ICE GLIDE',desc:'Speed on ice/snow',spd:1.15,hdl:0.85,cd:6000},
  {id:'canada',name:'Goose Trudeau',emoji:'🦆',color:0x2a2a2a,accent:0xFFFFFF,
   ability:'FEATHER BLAST',desc:'Shoot feathers forward',spd:0.95,hdl:1.1,cd:5000},
  {id:'golden',name:'Golden Goose',emoji:'⭐',color:0xFFCC00,accent:0xFF8800,
   ability:'GOLDEN SPRINT',desc:'Massive speed burst',spd:1.0,hdl:1.0,cd:10000},
];

const TRACKS = [
  {id:'snow',name:'Frosty Peaks',emoji:'❄️',
   sky:0x8BBFD4, ground:0xDDEEFF, road:0xBBCCDD, wall:0x7799AA,
   fog:0xAAD0E8, fogD:0.012, ambient:0x99BBCC, sun:0xCCDDFF},
  {id:'forest',name:'Fern Forest',emoji:'🌲',
   sky:0x0a1a0a, ground:0x1a3a10, road:0x111111, wall:0x2a4a15,
   fog:0x0a1a0a, fogD:0.018, ambient:0x223322, sun:0x99BB77},
  {id:'grass',name:'Meadow Mile',emoji:'🌿',
   sky:0x5BB8FF, ground:0x4a9a2a, road:0x444433, wall:0x2a6a10,
   fog:0x99DDFF, fogD:0.008, ambient:0x88BBFF, sun:0xFFFFCC},
];

// ── GAME STATE ─────────────────────────────────────────────────────────────
let scene,camera,renderer,clock;
let player,bots=[],projs=[];
let keys={},racing=false,finished=false,cdActive=false;
let raceTime=0;
let abReady=true,abCd=0,selChar,selTrack;
let trackPts=[];
const NLAPS=3,NCP=20;
let mmCtx;

// ── TRACK PATH ─────────────────────────────────────────────────────────────
function makeTrackPts(){
  const pts=[];
  for(let i=0;i<NCP;i++){
    const t=(i/NCP)*Math.PI*2;
    const rx=38+7*Math.sin(t*3+1);
    const rz=26+5*Math.cos(t*2+0.5);
    pts.push(new THREE.Vector3(Math.cos(t)*rx,0,Math.sin(t)*rz));
  }
  return pts;
}

// ── SCENE ──────────────────────────────────────────────────────────────────
function initScene(){
  const tk=selTrack;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(tk.sky);
  scene.fog=new THREE.FogExp2(tk.fog,tk.fogD);

  // Perspective camera, top-down angle
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,600);
  camera.position.set(0,70,30);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;

  clock=new THREE.Clock();

  // Lights
  scene.add(new THREE.AmbientLight(tk.ambient,1.3));
  const sun=new THREE.DirectionalLight(tk.sun,1.8);
  sun.position.set(40,80,20);
  sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  scene.add(sun);

  // Ground
  const gm=new THREE.Mesh(
    new THREE.PlaneGeometry(400,400),
    new THREE.MeshLambertMaterial({color:tk.ground})
  );
  gm.rotation.x=-Math.PI/2;
  gm.receiveShadow=true;
  scene.add(gm);

  trackPts=makeTrackPts();
  buildRoad(tk);
  buildDecos(tk);
  spawnKarts();
  mmCtx=document.getElementById('minimap').getContext('2d');
}

// ── ROAD ──────────────────────────────────────────────────────────────────
function buildRoad(tk){
  const pts=trackPts, N=pts.length, W=11;

  // Road surface
  const verts=[], idxs=[];
  for(let i=0;i<=N;i++){
    const c=pts[i%N], nx=pts[(i+1)%N];
    const d=new THREE.Vector3().subVectors(nx,c).normalize();
    const r=new THREE.Vector3(-d.z,0,d.x);
    verts.push(c.x+r.x*W, 0.05, c.z+r.z*W);
    verts.push(c.x-r.x*W, 0.05, c.z-r.z*W);
    if(i<N){
      const b=i*2;
      idxs.push(b,b+2,b+1, b+1,b+2,b+3);
    }
  }
  const rg=new THREE.BufferGeometry();
  rg.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  rg.setIndex(idxs);
  rg.computeVertexNormals();
  const rm=new THREE.Mesh(rg,new THREE.MeshLambertMaterial({color:tk.road}));
  rm.receiveShadow=true;
  scene.add(rm);

  // Centre dashes
  for(let i=0;i<N;i+=2){
    const p=pts[i], nx=pts[(i+1)%N];
    const d=new THREE.Vector3().subVectors(nx,p).normalize();
    const dm=new THREE.Mesh(
      new THREE.PlaneGeometry(0.5,3.5),
      new THREE.MeshBasicMaterial({color:0xFFFFFF,opacity:.6,transparent:true})
    );
    dm.rotation.x=-Math.PI/2;
    dm.rotation.z=-Math.atan2(d.x,d.z);
    dm.position.set(p.x,0.07,p.z);
    scene.add(dm);
  }

  // Start/finish line
  const s0=pts[0], s1=pts[1];
  const sd=new THREE.Vector3().subVectors(s1,s0).normalize();
  const sfm=new THREE.Mesh(
    new THREE.PlaneGeometry(W*2,2.5),
    new THREE.MeshBasicMaterial({color:0xFFFFFF})
  );
  sfm.rotation.x=-Math.PI/2;
  sfm.rotation.z=-Math.atan2(sd.x,sd.z);
  sfm.position.set(s0.x,0.08,s0.z);
  scene.add(sfm);

  // Walls
  const wmat=new THREE.MeshLambertMaterial({color:tk.wall});
  for(let i=0;i<N;i++){
    const c=pts[i], nx=pts[(i+1)%N];
    const d=new THREE.Vector3().subVectors(nx,c).normalize();
    const r=new THREE.Vector3(-d.z,0,d.x);
    const len=c.distanceTo(nx)+0.5;
    const mid=new THREE.Vector3().addVectors(c,nx).multiplyScalar(0.5);
    for(const s of[-1,1]){
      const wm=new THREE.Mesh(new THREE.BoxGeometry(len,2.2,1.2),wmat);
      wm.position.set(mid.x+r.x*(W+0.6)*s, 1.1, mid.z+r.z*(W+0.6)*s);
      wm.rotation.y=Math.atan2(d.x,d.z);
      wm.castShadow=true;
      scene.add(wm);
    }
  }
}

// ── DECORATIONS ──────────────────────────────────────────────────────────
function buildDecos(tk){
  for(let i=0;i<55;i++){
    let x,z,tries=0;
    do{
      x=(Math.random()-.5)*280; z=(Math.random()-.5)*240; tries++;
      // avoid track area
    }while(tries<20 && trackPts.some(p=>Math.hypot(x-p.x,z-p.z)<18));

    if(tk.id==='snow'){
      // Pine tree (cone + trunk)
      const h=3.5+Math.random()*5;
      const tree=new THREE.Group();
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.25,.3,1.2,6),
        new THREE.MeshLambertMaterial({color:0x886644}));
      trunk.position.y=.6;
      tree.add(trunk);
      const cone=new THREE.Mesh(new THREE.ConeGeometry(1.3+Math.random()*.5,h,7),
        new THREE.MeshLambertMaterial({color:0xCCEEFF}));
      cone.position.y=1.2+h/2;
      tree.add(cone);
      // Snow cap
      const cap=new THREE.Mesh(new THREE.ConeGeometry(.6,.9,6),
        new THREE.MeshLambertMaterial({color:0xFFFFFF}));
      cap.position.y=1.2+h;
      tree.add(cap);
      tree.position.set(x,0,z);
      scene.add(tree);
    } else if(tk.id==='forest'){
      const h=4+Math.random()*9;
      const tree=new THREE.Group();
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.28,.4,1.5,6),
        new THREE.MeshLambertMaterial({color:0x4a2a10}));
      trunk.position.y=.75;
      tree.add(trunk);
      const gcol=new THREE.Color(0x0a3a0a);
      gcol.addScalar(Math.random()*.12);
      const cone=new THREE.Mesh(new THREE.ConeGeometry(1.5+Math.random(),h,7),
        new THREE.MeshLambertMaterial({color:gcol}));
      cone.position.y=1.5+h/2;
      tree.add(cone);
      tree.position.set(x,0,z);
      scene.add(tree);
    } else {
      // Grass tuft / flower
      const col=[0x33AA33,0x55CC22,0xFFFF44,0xFF88AA][Math.floor(Math.random()*4)];
      const b=new THREE.Mesh(
        new THREE.SphereGeometry(.6+Math.random()*.9,7,5),
        new THREE.MeshLambertMaterial({color:col})
      );
      b.position.set(x,.6,z);
      scene.add(b);
    }
  }
}

// ── KART MESH ─────────────────────────────────────────────────────────────
function makeKart(col,acc){
  const g=new THREE.Group();
  // Body
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.8,1,4),
    new THREE.MeshLambertMaterial({color:col}));
  body.position.y=.7; body.castShadow=true; g.add(body);
  // Nose accent
  const nose=new THREE.Mesh(new THREE.BoxGeometry(2,0.7,1.3),
    new THREE.MeshLambertMaterial({color:acc}));
  nose.position.set(0,.55,2.4); g.add(nose);
  // Goose body
  const gb=new THREE.Mesh(new THREE.SphereGeometry(.75,9,7),
    new THREE.MeshLambertMaterial({color:0xF5F0DC}));
  gb.scale.y=1.25; gb.position.set(0,2,0.2); g.add(gb);
  // Head
  const gh=new THREE.Mesh(new THREE.SphereGeometry(.42,8,6),
    new THREE.MeshLambertMaterial({color:0xF5F0DC}));
  gh.position.set(0,2.9,0.85); g.add(gh);
  // Beak
  const bk=new THREE.Mesh(new THREE.ConeGeometry(.14,.5,5),
    new THREE.MeshLambertMaterial({color:0xFF9900}));
  bk.rotation.x=Math.PI/2; bk.position.set(0,2.8,1.4); g.add(bk);
  // Eyes
  for(const sx of[-.25,.25]){
    const ey=new THREE.Mesh(new THREE.SphereGeometry(.07,5,5),
      new THREE.MeshBasicMaterial({color:0x111111}));
    ey.position.set(sx,3.05,1.2); g.add(ey);
  }
  // Wheels
  for(const [wx,wz] of[[-1.55,1.35],[1.55,1.35],[-1.55,-1.35],[1.55,-1.35]]){
    const wh=new THREE.Mesh(new THREE.CylinderGeometry(.55,.55,.45,10),
      new THREE.MeshLambertMaterial({color:0x222222}));
    wh.rotation.z=Math.PI/2; wh.position.set(wx,.45,wz); g.add(wh);
  }
  return g;
}

// ── KART SPAWN ────────────────────────────────────────────────────────────
function spawnKarts(){
  const ch=selChar;
  player={
    mesh:makeKart(ch.color,ch.accent),
    pos:trackPts[0].clone(),
    angle:0,spd:0,
    cp:0,lap:1,done:false,
    stunned:0,boost:0,
    char:ch,
  };
  player.mesh.position.copy(player.pos);
  scene.add(player.mesh);

  const others=CHARS.filter(c=>c.id!==ch.id);
  const botCols=[0xFF4455,0x44FF88,0x4488FF];
  others.slice(0,3).forEach((bc,i)=>{
    const startCp=Math.floor((i+1)*NCP/4);
    const bot={
      mesh:makeKart(bc.color,bc.accent),
      pos:trackPts[startCp].clone(),
      angle:0,spd:0,
      cp:startCp,lap:1,done:false,
      stunned:0,boost:0,
      char:bc,
      aiTgt:(startCp+1)%NCP,
      aiWander:(Math.random()-.5)*.35,
    };
    // offset spawn slightly
    bot.pos.x+=(Math.random()-.5)*5;
    bot.pos.z+=(Math.random()-.5)*5;
    bot.mesh.position.copy(bot.pos);
    scene.add(bot.mesh);
    bots.push(bot);
  });
}

// ── PHYSICS ───────────────────────────────────────────────────────────────
const MAXSPD=.65, ACC=.022, BRK=.038, FRIC=.014, TURN=.038;

function updatePlayer(dt){
  const k=player;
  if(!racing||finished||cdActive) return;

  const ms=k.boost>0?MAXSPD*k.char.spd*1.7:MAXSPD*k.char.spd;
  if(k.stunned>0){ k.stunned-=dt*1000; k.spd*=.9; }
  else {
    if(k.boost>0) k.boost-=dt*1000;
    if(keys['KeyW']||keys['ArrowUp'])   k.spd=Math.min(k.spd+ACC,ms);
    else if(keys['KeyS']||keys['ArrowDown']) k.spd=Math.max(k.spd-BRK,-ms*.35);
    else { k.spd*=(1-FRIC); if(Math.abs(k.spd)<.001) k.spd=0; }
    const tr=TURN*k.char.hdl*Math.min(Math.abs(k.spd)/MAXSPD+.3,1);
    if(keys['KeyA']||keys['ArrowLeft'])  k.angle+=tr;
    if(keys['KeyD']||keys['ArrowRight']) k.angle-=tr;
  }

  k.pos.x-=Math.sin(k.angle)*k.spd;
  k.pos.z-=Math.cos(k.angle)*k.spd;
  constrainToTrack(k);
  k.mesh.position.copy(k.pos);
  k.mesh.position.y=0;
  k.mesh.rotation.y=k.angle;
  checkCP(k,true);
}

function updateBot(b,dt){
  const tgt=trackPts[b.aiTgt];
  const dx=tgt.x-b.pos.x, dz=tgt.z-b.pos.z;
  if(Math.sqrt(dx*dx+dz*dz)<7){
    b.aiTgt=(b.aiTgt+1)%NCP;
    if(Math.random()<.3) b.aiWander=(Math.random()-.5)*.4;
  }
  const ta=Math.atan2(-dx,-dz)+b.aiWander;
  let da=ta-b.angle;
  while(da>Math.PI) da-=Math.PI*2;
  while(da<-Math.PI) da+=Math.PI*2;
  b.angle+=Math.sign(da)*Math.min(Math.abs(da),TURN*b.char.hdl);

  if(b.stunned>0){ b.stunned-=dt*1000; b.spd*=.88; }
  else b.spd=Math.min(b.spd+ACC*.75,MAXSPD*b.char.spd*.88);

  b.pos.x-=Math.sin(b.angle)*b.spd;
  b.pos.z-=Math.cos(b.angle)*b.spd;
  constrainToTrack(b);
  b.mesh.position.copy(b.pos);
  b.mesh.position.y=0;
  b.mesh.rotation.y=b.angle;
  checkCP(b,false);
}

function constrainToTrack(k){
  let best=Infinity, nearPt=trackPts[0];
  for(const p of trackPts){
    const d=Math.hypot(k.pos.x-p.x,k.pos.z-p.z);
    if(d<best){ best=d; nearPt=p; }
  }
  if(best>12.5){
    const push=new THREE.Vector3(nearPt.x-k.pos.x,0,nearPt.z-k.pos.z).normalize();
    k.pos.x+=push.x*(best-12)*0.45;
    k.pos.z+=push.z*(best-12)*0.45;
    k.spd*=.65;
  }
}

function checkCP(k,isPlayer){
  const next=(k.cp+1)%NCP;
  if(Math.hypot(k.pos.x-trackPts[next].x,k.pos.z-trackPts[next].z)<9){
    k.cp=next;
    if(k.cp===0){
      k.lap++;
      if(isPlayer){
        if(k.lap>NLAPS){ endRace(); return; }
        document.getElementById('lapd').textContent=`LAP ${Math.min(k.lap,NLAPS)}/${NLAPS}`;
        floatText(`🏁 LAP ${Math.min(k.lap,NLAPS)}!`,'#FFD700');
      }
    }
  }
}

// ── PROJECTILES ───────────────────────────────────────────────────────────
function updateProjs(dt){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    p.life-=dt*1000;
    p.pos.x-=Math.sin(player.angle)*1.1;
    p.pos.z-=Math.cos(player.angle)*1.1;
    p.mesh.position.copy(p.pos);
    p.mesh.rotation.y+=.25;
    for(const b of bots){
      if(Math.hypot(p.pos.x-b.pos.x,p.pos.z-b.pos.z)<3.5){
        b.stunned=2200; scene.remove(p.mesh); projs.splice(i,1); break;
      }
    }
    if(p.life<=0){ scene.remove(p.mesh); projs.splice(i,1); }
  }
}

// ── ABILITIES ─────────────────────────────────────────────────────────────
function fireAbility(){
  if(!racing||finished||cdActive||!abReady) return;
  abReady=false; abCd=selChar.cd;
  const id=selChar.id;
  if(id==='honker'){
    bots.forEach(b=>{ if(Math.hypot(player.pos.x-b.pos.x,player.pos.z-b.pos.z)<22) b.stunned=2500; });
    flashScreen('#FFD700',.4); floatText('💛 HONK!','#FFD700');
  } else if(id==='grey'){
    player.boost=3000; flashScreen('#7DF9FF',.3); floatText('❄️ ICE GLIDE!','#7DF9FF');
  } else if(id==='canada'){
    const pm={mesh:new THREE.Mesh(new THREE.SphereGeometry(.55,6,4),
      new THREE.MeshBasicMaterial({color:0xFFFFFF})),
      pos:player.pos.clone(),life:3200};
    scene.add(pm.mesh); projs.push(pm);
    flashScreen('#FFFFFF',.25); floatText('🪶 FEATHERS!','#fff');
  } else {
    player.boost=4500; flashScreen('#FFD700',.55); floatText('⭐ GOLDEN SPRINT!','#FFD700');
  }
}

function flashScreen(col,op){
  const el=document.getElementById('flash');
  el.style.background=col; el.style.opacity=op;
  setTimeout(()=>el.style.opacity=0,280);
}

function floatText(txt,col){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
    font-size:46px;font-weight:900;color:${col};text-shadow:3px 3px 0 #000;
    pointer-events:none;z-index:80;animation:ft 1s ease forwards;`;
  d.textContent=txt;
  if(!document.getElementById('ftStyle')){
    const s=document.createElement('style');
    s.id='ftStyle';
    s.textContent='@keyframes ft{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-80%) scale(1.2);opacity:0}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

// ── POSITION ──────────────────────────────────────────────────────────────
function getPos(){
  const ps=player.lap*NCP+player.cp;
  let pos=1;
  for(const b of bots){ if(b.lap*NCP+b.cp>ps) pos++; }
  return pos;
}

// ── MINIMAP ───────────────────────────────────────────────────────────────
function drawMinimap(){
  const c=mmCtx,W=110,H=110,sc=.48;
  c.clearRect(0,0,W,H);
  c.fillStyle='rgba(0,0,0,.72)'; c.fillRect(0,0,W,H);
  // track
  c.strokeStyle='#555'; c.lineWidth=5;
  c.beginPath();
  trackPts.forEach((p,i)=>{
    const x=W/2+p.x*sc, y=H/2+p.z*sc;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  });
  c.closePath(); c.stroke();
  // bots
  c.fillStyle='#FF5555';
  for(const b of bots){
    c.beginPath(); c.arc(W/2+b.pos.x*sc,H/2+b.pos.z*sc,3.5,0,Math.PI*2); c.fill();
  }
  // player
  c.fillStyle='#FFD700';
  c.beginPath(); c.arc(W/2+player.pos.x*sc,H/2+player.pos.z*sc,5,0,Math.PI*2); c.fill();
}

// ── CAMERA ────────────────────────────────────────────────────────────────
function updateCam(){
  // Top-down follow: camera directly above + slightly behind player direction
  const ox=-Math.sin(player.angle)*12;
  const oz=-Math.cos(player.angle)*12;
  camera.position.set(player.pos.x+ox, 68, player.pos.z+oz);
  camera.lookAt(player.pos.x, 0, player.pos.z);
}

// ── HUD UPDATE ────────────────────────────────────────────────────────────
function updateHUD(dt){
  raceTime+=dt;
  document.getElementById('spdd').textContent=`${Math.round(Math.abs(player.spd)*200)} km/h`;
  document.getElementById('posd').textContent=`POS ${getPos()}/4`;
  if(!abReady){
    abCd=Math.max(0,abCd-dt*1000);
    document.getElementById('abfill').style.width=((1-abCd/selChar.cd)*100)+'%';
    if(abCd<=0){ abReady=true; document.getElementById('abfill').style.width='100%'; }
  }
}

// ── FINISH ────────────────────────────────────────────────────────────────
function endRace(){
  if(finished) return;
  finished=true; player.done=true;
  const pos=getPos();
  const m=Math.floor(raceTime/60), s=(raceTime%60).toFixed(2);
  const labels=['🥇 1ST PLACE!','🥈 2ND PLACE','🥉 3RD PLACE','4TH PLACE'];
  document.getElementById('fintitle').textContent=pos===1?'🏆 WINNER! HONK HONK!':'🏁 RACE OVER!';
  document.getElementById('finpos').textContent=labels[pos-1]||`${pos}TH`;
  document.getElementById('fintm').textContent=`Time: ${m}:${s.padStart(5,'0')}`;
  document.getElementById('fin').style.display='flex';
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────
function startCD(){
  cdActive=true;
  const el=document.getElementById('cdtxt');
  const seq=['3','2','1','HONK! 🪿'];
  let i=0;
  el.style.display='flex';
  function tick(){
    el.textContent=seq[i++];
    if(i<seq.length) setTimeout(tick,900);
    else setTimeout(()=>{ el.style.display='none'; cdActive=false; racing=true; },750);
  }
  tick();
}

// ── LOOP ──────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  if(racing&&!finished&&!cdActive){
    updatePlayer(dt);
    bots.forEach(b=>updateBot(b,dt));
    updateProjs(dt);
    updateHUD(dt);
  }
  updateCam();
  drawMinimap();
  renderer.render(scene,camera);
}

// ── MENU ──────────────────────────────────────────────────────────────────
(function setupMenu(){
  let scid=CHARS[0].id, stid=TRACKS[0].id;

  const cg=document.getElementById('cgrid');
  CHARS.forEach(ch=>{
    const d=document.createElement('div');
    d.className='ccard'+(ch.id===scid?' sel':'');
    d.innerHTML=`<div class="cemoji">${ch.emoji}</div>
      <div class="cname">${ch.name}</div>
      <div class="cabl">✨ ${ch.ability}</div>
      <div class="cabl" style="color:#888">${ch.desc}</div>
      <div style="color:#7DF9FF;font-size:11px;margin-top:4px">SPD ${Math.round(ch.spd*10)} HDL ${Math.round(ch.hdl*10)}</div>`;
    d.onclick=()=>{ document.querySelectorAll('.ccard').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); scid=ch.id; };
    cg.appendChild(d);
  });

  const tg=document.getElementById('tgrid');
  TRACKS.forEach(tk=>{
    const d=document.createElement('div');
    d.className='tcard'+(tk.id===stid?' sel':'');
    d.innerHTML=`<div class="temoji">${tk.emoji}</div><div class="tname">${tk.name}</div>`;
    d.onclick=()=>{ document.querySelectorAll('.tcard').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); stid=tk.id; };
    tg.appendChild(d);
  });

  document.getElementById('sbtn').onclick=()=>{
    selChar=CHARS.find(c=>c.id===scid);
    selTrack=TRACKS.find(t=>t.id===stid);
    document.getElementById('menu').style.display='none';
    // Show HUD
    document.getElementById('hud').style.display='flex';
    document.getElementById('trkind').style.display='block';
    document.getElementById('trkind').textContent=`${selTrack.emoji} ${selTrack.name.toUpperCase()}`;
    document.getElementById('abbar').style.display='flex';
    document.getElementById('abicon').textContent=selChar.emoji;
    document.getElementById('ablbl').innerHTML=selChar.ability+'<br><span style="color:#aaa;font-size:11px">SPACE</span>';
    document.getElementById('minimap').style.display='block';
    initScene();
    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
    loop();
    startCD();
  };
})();

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){ e.preventDefault(); fireAbility(); }
});
window.addEventListener('keyup',e=>keys[e.code]=false);
</script>
